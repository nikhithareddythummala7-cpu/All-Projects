server:
  port: 8080
spring:
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/streamy}
  jackson:
    serialization:
      INDENT_OUTPUT: true
jwt:
  secret: ${JWT_SECRET:your_jwt_secret}
  expiration: 86400000 # 1 day in ms
cors:
  allowed-origins: http://localhost:3000
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"
swagger:
  enabled: true
