<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Publications • Research Publications</title>
    <link rel="stylesheet" th:href="@{/css/main.css}" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div th:insert="fragments/header :: siteHeader"></div>
    <main class="container">
      <h2>Publications</h2>
      <div class="grid" th:if="${publications != null}">
        <div class="card" th:each="p : ${publications}" th:attr="data-status=${p.status}">
          <div class="card-body">
            <h3 th:text="${p.title}">Title</h3>
            <p class="muted" th:text="${p.domain}">Domain</p>
            <p th:text="${p.description}">Description...</p>
            <div style="display:flex; align-items:center; gap:.5rem; margin:.5rem 0;">
              <span class="badge" th:classappend=" ${p.status}" th:text="${p.status}">status</span>
            </div>
            <a class="btn small" th:href="@{'/publications/' + ${p._id}}">View</a>
          </div>
        </div>
      </div>
      <p th:if="${publications == null or publications.isEmpty()}">No publications found.</p>
    </main>
    <div th:insert="fragments/footer :: siteFooter"></div>
    <script src="/js/app.js"></script>
  </body>
</html>
