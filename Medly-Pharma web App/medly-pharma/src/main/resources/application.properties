spring.application.name=medly-pharma

# Server Configuration
server.port=8080
server.servlet.context-path=/

# MongoDB Configuration
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=medly-pharma
spring.data.mongodb.auto-index-creation=true

# Connection settings
spring.data.mongodb.uri=mongodb://${spring.data.mongodb.host}:${spring.data.mongodb.port}/${spring.data.mongodb.database}?retryWrites=true&w=majority

# Connection pool settings
spring.data.mongodb.auto-index-creation=true
spring.data.mongodb.auto-create-indexes=true

# Timeout settings
spring.data.mongodb.connect-timeout=5000
spring.data.mongodb.socket-timeout=30000
spring.data.mongodb.server-selection-timeout=5000

# Enable MongoDB logging
logging.level.org.mongodb.driver=INFO
logging.level.org.springframework.data.mongodb=INFO

# JWT Configuration
app.jwt.secret=mySecretKey12345678901234567890123456789012345678901234567890
app.jwt.expiration-ms=86400000

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML5
spring.thymeleaf.encoding=UTF-8

# Static Resources Configuration
spring.web.resources.static-locations=classpath:/static/,classpath:/public/,classpath:/resources/,classpath:/META-INF/resources/
spring.mvc.static-path-pattern=/**
spring.web.resources.cache.period=0
spring.web.resources.chain.strategy.content.enabled=true
spring.web.resources.chain.strategy.content.paths=/**

# Logging
logging.level.org.springframework=DEBUG
logging.level.com.example.medlypharma=TRACE
logging.level.org.thymeleaf=DEBUG
logging.level.org.hibernate=ERROR
logging.level.org.mongodb.driver=DEBUG

# Error handling
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always

# File Storage
app.file.upload-dir=uploads/prescriptions/
app.file.max-size=10MB

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Async Configuration
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=500
spring.task.execution.thread-name-prefix=medly-async-

# Admin Email for Alerts
app.admin.email=admin@medlypharma.com

# Enable Thymeleaf debug mode
spring.thymeleaf.cache=false
logging.level.org.thymeleaf=DEBUG
