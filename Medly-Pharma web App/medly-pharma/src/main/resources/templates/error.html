<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Error</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .error-container {
            max-width: 600px;
            margin: 100px auto;
            padding: 20px;
            text-align: center;
        }
        .error-details {
            margin-top: 20px;
            text-align: left;
            background-color: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            font-family: monospace;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-container">
            <h1 class="text-danger">Oops! Something went wrong</h1>
            <p class="lead">We're sorry, but an unexpected error occurred.</p>
            
            <div th:if="${error}" class="error-details">
                <strong>Error:</strong> <span th:text="${error}"></span><br>
                <strong>Status:</strong> <span th:text="${status}"></span><br>
                <strong>Path:</strong> <span th:text="${path}"></span><br>
                <strong>Timestamp:</strong> <span th:text="${timestamp}"></span>
                
                <div th:if="${trace}" style="margin-top: 10px;">
                    <strong>Stack Trace:</strong>
                    <div style="max-height: 200px; overflow-y: auto;">
                        <pre th:text="${trace}"></pre>
                    </div>
                </div>
            </div>
            
            <div class="mt-4">
                <a href="/" class="btn btn-primary">Return to Home</a>
                <a href="javascript:history.back()" class="btn btn-secondary">Go Back</a>
            </div>
        </div>
    </div>
</body>
</html>
