<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/fragments/layout}">
<head>
    <title>Prescriptions - Admin Panel</title>
</head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
        <h1 class="h2">Prescriptions</h1>
        <div class="btn-toolbar mb-2 mb-md-0">
            <a th:href="@{/admin/prescriptions/upload}" class="btn btn-sm btn-outline-primary">
                <i class="bi bi-upload"></i> Upload Prescription
            </a>
        </div>
    </div>

    <!-- Search and Filter Form -->
    <div class="card mb-4">
        <div class="card-body">
            <form th:action="@{/admin/prescriptions}" method="get" class="row g-3">
                <div class="col-md-6">
                    <input type="text" class="form-control" name="search" th:value="${search}" 
                           placeholder="Search by patient name, doctor name, or note...">
                </div>
                <div class="col-md-3">
                    <select name="status" class="form-select">
                        <option value="">All Statuses</option>
                        <option th:each="status : ${statuses}"
                                th:value="${status}"
                                th:text="${status}"
                                th:selected="${status == selectedStatus}">
                        </option>
                    </select>
                </div>
                <div class="col-md-3">
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-search"></i> Search
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Prescriptions Table -->
    <div class="card">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-striped table-hover">
                    <thead>
                    <tr>
                        <th>Date</th>
                        <th>Patient</th>
                        <th>Doctor</th>
                        <th>Note</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="prescription : ${prescriptions}">
                        <td th:text="${#temporals.format(prescription.createdAt, 'MMM dd, yyyy')}">Date</td>
                        <td>
                            <a th:href="#" th:text="${prescription.patientName}">Patient Name</a>
                        </td>
                        <td th:text="${prescription.doctorName}">Doctor Name</td>
                        <td>
                            <span class="text-truncate d-inline-block" style="max-width: 200px;" 
                                  th:title="${prescription.note}" 
                                  th:text="${#strings.abbreviate(prescription.note, 30)}">
                                Note preview...
                            </span>
                        </td>
                        <td>
                            <span class="badge" 
                                  th:class="${'bg-' + (
                                    prescription.status == 'PENDING' ? 'warning' : 
                                    prescription.status == 'PROCESSING' ? 'info' :
                                    prescription.status == 'COMPLETED' ? 'success' :
                                    prescription.status == 'REJECTED' ? 'danger' : 'secondary'
                                  )}">
                                <span th:text="${prescription.status}">Status</span>
                            </span>
                        </td>
                        <td>
                            <div class="btn-group btn-group-sm">
                                <a th:href="@{/admin/prescriptions/{id}(id=${prescription.id})}" 
                                   class="btn btn-outline-primary" 
                                   title="View">
                                    <i class="bi bi-eye"></i>
                                </a>
                                <a th:if="${prescription.status == 'PENDING'}"
                                   th:href="@{/admin/prescriptions/{id}/approve(id=${prescription.id})}" 
                                   class="btn btn-outline-success"
                                   title="Approve">
                                    <i class="bi bi-check-lg"></i>
                                </a>
                                <a th:if="${prescription.status == 'PENDING'}"
                                   th:href="#" 
                                   class="btn btn-outline-danger"
                                   title="Reject"
                                   onclick="showRejectModal('${prescription.id}')">
                                    <i class="bi bi-x-lg"></i>
                                </a>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${prescriptions.empty}">
                        <td colspan="6" class="text-center">No prescriptions found</td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <!-- Pagination -->
            <nav th:if="${totalPages > 1}" aria-label="Page navigation" class="mt-4">
                <ul class="pagination justify-content-center">
                    <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                        <a class="page-link" 
                           th:href="@{/admin/prescriptions(page=${currentPage - 1}, search=${search}, status=${selectedStatus})}" 
                           th:if="${currentPage > 1}">
                            Previous
                        </a>
                        <span class="page-link" th:unless="${currentPage > 1}">Previous</span>
                    </li>
                    
                    <li th:each="page : ${pageNumbers}" class="page-item" th:classappend="${page == currentPage} ? 'active'">
                        <a class="page-link" 
                           th:href="@{/admin/prescriptions(page=${page}, search=${search}, status=${selectedStatus})}" 
                           th:text="${page}">1</a>
                    </li>
                    
                    <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                        <a class="page-link" 
                           th:href="@{/admin/prescriptions(page=${currentPage + 1}, search=${search}, status=${selectedStatus})}"
                           th:if="${currentPage < totalPages}">
                            Next
                        </a>
                        <span class="page-link" th:unless="${currentPage < totalPages}">Next</span>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>

<!-- Reject Prescription Modal -->
<div class="modal fade" id="rejectModal" tabindex="-1" aria-labelledby="rejectModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <form id="rejectForm" method="post" th:action="">
                <div class="modal-header">
                    <h5 class="modal-title" id="rejectModalLabel">Reject Prescription</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="rejectionReason" class="form-label">Reason for Rejection</label>
                        <textarea class="form-control" id="rejectionReason" name="reason" rows="3" required></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-danger">Reject Prescription</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Delete Confirmation Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1" aria-labelledby="deleteModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="deleteModalLabel">Confirm Deletion</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" id="deleteModalBody">
                Are you sure you want to delete this prescription?
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <a id="deleteButton" href="#" class="btn btn-danger">Delete</a>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    // Function to show reject modal with dynamic form action
    function showRejectModal(prescriptionId) {
        const form = document.getElementById('rejectForm');
        form.action = '/admin/prescriptions/' + prescriptionId + '/reject';
        document.getElementById('rejectionReason').value = '';
        new bootstrap.Modal(document.getElementById('rejectModal')).show();
    }
    
    // Function to confirm deletion
    function confirmDelete(message, url) {
        document.getElementById('deleteModalBody').textContent = message;
        document.getElementById('deleteButton').href = url;
        new bootstrap.Modal(document.getElementById('deleteModal')).show();
    }
</script>
</body>
</html>
