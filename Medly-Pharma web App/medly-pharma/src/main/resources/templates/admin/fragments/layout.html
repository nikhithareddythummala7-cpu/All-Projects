<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{fragments/layout}">
<head>
    <title>Admin - Medly Pharma</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
    <div layout:fragment="content">
        <div class="admin-container">
            <!-- Sidebar -->
            <div th:replace="admin/fragments/sidebar :: sidebar"></div>

            <!-- Main Content -->
            <div class="admin-main">
                <!-- Top Navigation -->
                <nav class="admin-top-nav">
                    <div class="d-flex justify-content-between align-items-center">
                        <div class="d-flex align-items-center">
                            <button class="btn btn-link text-dark d-md-none" id="sidebarToggle">
                                <i class="fas fa-bars"></i>
                            </button>
                            <h4 class="mb-0 ms-3" th:text="${pageTitle}">Dashboard</h4>
                        </div>
                        <div class="d-flex align-items-center">
                            <div class="dropdown">
                                <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button"
                                   data-bs-toggle="dropdown" aria-expanded="false">
                                    <i class="fas fa-user-circle me-1"></i>
                                    <span sec:authentication="name">Admin</span>
                                </a>
                                <ul class="dropdown-menu dropdown-menu-end">
                                    <li><a class="dropdown-item" th:href="@{/profile}">Profile</a></li>
                                    <li><hr class="dropdown-divider"></li>
                                    <li>
                                        <form th:action="@{/logout}" method="post" class="d-inline">
                                            <button type="submit" class="dropdown-item">Logout</button>
                                        </form>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </nav>

                <!-- ✅ Keep only ONE of these -->
                <div class="admin-content">
                    <div layout:fragment="admin-content">
                        <!-- Content will be inserted here -->
                    </div>

                    <!-- Messages -->
                    <div th:if="${#bannerMessage}" class="alert alert-info" th:text="${#bannerMessage}"></div>
                    <div th:if="${#errorMessage}" class="alert alert-danger" th:text="${#errorMessage}"></div>
                    <div th:if="${#successMessage}" class="alert alert-success" th:text="${#successMessage}"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Core Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/admin.js}"></script>
    
    <!-- Page Specific Scripts -->
    <th:block layout:fragment="scripts">
        <!-- Scripts will be inserted here -->
    </th:block>
    
    <!-- Fallback for scripts if layout fragment not working -->
    <script th:if="${#bools.isFalse(#ctx.containsVariable('fragment'))}">
        console.log("Using fallback script loading");
        if (typeof initCharts === 'function') {
            document.addEventListener('DOMContentLoaded', initCharts);
        }
    </script>
</body>
</html>
