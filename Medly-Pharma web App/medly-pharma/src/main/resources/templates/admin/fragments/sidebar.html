<div class="admin-sidebar" th:fragment="sidebar">
    <div class="sidebar-header">
        <a th:href="@{/admin/dashboard}" class="d-flex align-items-center">
            <i class="fas fa-pills me-2"></i>
            <span class="ms-1">Medly Pharma</span>
        </a>
    </div>
    
    <div class="sidebar-menu">
        <ul class="nav flex-column">
            <li class="nav-item">
                <a class="nav-link" th:classappend="${currentUri == '/admin/dashboard'} ? 'active'"
                   th:href="@{/admin/dashboard}">
                    <i class="fas fa-tachometer-alt me-2"></i>
                    <span>Dashboard</span>
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link" th:classappend="${currentUri.startsWith('/admin/orders')} ? 'active'"
                   th:href="@{/admin/orders}">
                    <i class="fas fa-shopping-cart me-2"></i>
                    <span>Orders</span>
                    <span class="badge bg-danger rounded-pill ms-auto" th:if="${pendingOrderCount > 0}"
                          th:text="${pendingOrderCount}">0</span>
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link" th:classappend="${currentUri.startsWith('/admin/users')} ? 'active'"
                   th:href="@{/admin/users}">
                    <i class="fas fa-users me-2"></i>
                    <span>Users</span>
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link" th:classappend="${currentUri.startsWith('/admin/reports')} ? 'active'"
                   th:href="@{/admin/reports}">
                    <i class="fas fa-chart-bar me-2"></i>
                    <span>Reports</span>
                </a>
            </li>
            
            <li class="nav-item mt-4">
                <a class="nav-link" th:href="@{/}">
                    <i class="fas fa-arrow-left me-2"></i>
                    <span>Back to Store</span>
                </a>
            </li>
        </ul>
    </div>
    
    <div class="sidebar-footer">
        <div class="text-muted small">
            <div>Medly Pharma Admin</div>
            <div>v1.0.0</div>
        </div>
    </div>
</div>
