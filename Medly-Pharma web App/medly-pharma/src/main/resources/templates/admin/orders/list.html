<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/fragments/layout}">
<head>
    <title>Orders - Admin Panel</title>
</head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
        <h1 class="h2">Orders</h1>
    </div>

    <!-- Search and Filter Form -->
    <div class="card mb-4">
        <div class="card-body">
            <form th:action="@{/admin/orders}" method="get" class="row g-3">
                <div class="col-md-6">
                    <input type="text" class="form-control" name="keyword" th:value="${keyword}" placeholder="Search by order ID or email...">
                </div>
                <div class="col-md-4">
                    <select name="status" class="form-select">
                        <option value="">All Statuses</option>
                        <option th:each="statusOpt : ${T(com.example.medlypharma.model.Order$OrderStatus).values()}"
                                th:value="${statusOpt}"
                                th:text="${statusOpt}"
                                th:selected="${statusOpt.name() == status}">
                        </option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary w-100">Search</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Orders Table -->
    <div class="card">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-striped table-hover">
                    <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>Customer Email</th>
                        <th>Date</th>
                        <th>Total</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="order : ${orders}">
                        <td th:text="${order.id}">Order ID</td>
                        <td th:text="${order.userEmail}">user@example.com</td>
                        <td th:text="${#temporals.format(order.orderDate, 'MMM dd, yyyy HH:mm')}">Date</td>
                        <td th:text="${#numbers.formatDecimal(order.totalAmount, 1, 2)}">$0.00</td>
                        <td>
                            <span class="badge" 
                                  th:classappend="${'bg-' + (order.status == 'PENDING' ? 'warning' : 
                                                           order.status == 'PROCESSING' ? 'info' :
                                                           order.status == 'SHIPPED' ? 'primary' :
                                                           order.status == 'DELIVERED' ? 'success' :
                                                           order.status == 'CANCELLED' ? 'danger' : 'secondary')}">
                                <span th:text="${order.status}">Status</span>
                            </span>
                        </td>
                        <td>
                            <a th:href="@{/admin/orders/{id}(id=${order.id})}" class="btn btn-sm btn-info">
                                <i class="bi bi-eye"></i> View
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${orders.empty}">
                        <td colspan="6" class="text-center">No orders found</td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <!-- Pagination -->
            <nav th:if="${totalPages > 1}" aria-label="Page navigation" class="mt-4">
                <ul class="pagination justify-content-center">
                    <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                        <a class="page-link" th:href="@{/admin/orders(page=${currentPage - 1}, keyword=${keyword}, status=${status})}" 
                           th:if="${currentPage > 1}">Previous</a>
                        <span class="page-link" th:unless="${currentPage > 1}">Previous</span>
                    </li>
                    
                    <li th:each="page : ${pageNumbers}" class="page-item" th:classappend="${page == currentPage} ? 'active'">
                        <a class="page-link" th:href="@{/admin/orders(page=${page}, keyword=${keyword}, status=${status})}" 
                           th:text="${page}">1</a>
                    </li>
                    
                    <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                        <a class="page-link" th:href="@{/admin/orders(page=${currentPage + 1}, keyword=${keyword}, status=${status})}"
                           th:if="${currentPage < totalPages}">Next</a>
                        <span class="page-link" th:unless="${currentPage < totalPages}">Next</span>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>

<!-- Include any additional scripts here -->
</body>
</html>
