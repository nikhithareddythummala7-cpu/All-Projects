<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/fragments/layout}">
<head>
    <title>Users - Admin - Medly Pharma</title>
</head>
<body>
    <div layout:fragment="admin-content">
        <!-- Page Heading -->
        <div class="d-sm-flex align-items-center justify-content-between mb-4">
            <h1 class="h3 mb-0 text-gray-800">User Management</h1>
            <a th:href="@{/admin/users/new}" class="d-none d-sm-inline-block btn btn-sm btn-primary shadow-sm">
                <i class="fas fa-plus fa-sm text-white-50"></i> Add New User
            </a>
        </div>

        <!-- Search and Filter -->
        <div class="card shadow mb-4">
            <div class="card-body">
                <form th:action="@{/admin/users}" method="get" class="row g-3">
                    <div class="col-md-8">
                        <div class="input-group">
                            <input type="text" name="keyword" class="form-control" placeholder="Search users..." 
                                   th:value="${keyword}">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-search"></i> Search
                            </button>
                        </div>
                    </div>
                    <div class="col-md-2">
                        <select name="size" class="form-select" onchange="this.form.submit()">
                            <option value="5" th:selected="${size == 5}">5 per page</option>
                            <option value="10" th:selected="${size == 10}">10 per page</option>
                            <option value="25" th:selected="${size == 25}">25 per page</option>
                            <option value="50" th:selected="${size == 50}">50 per page</option>
                        </select>
                    </div>
                </form>
            </div>
        </div>

        <!-- Users Table -->
        <div class="card shadow mb-4">
            <div class="card-header py-3">
                <h6 class="m-0 font-weight-bold text-primary">All Users</h6>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-bordered table-hover" id="usersTable" width="100%" cellspacing="0">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Status</th>
                                <th>Joined</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(users)}">
                                <td colspan="7" class="text-center">No users found</td>
                            </tr>
                            <tr th:each="user : ${users}">
                                <td th:text="${user.id}">1</td>
                                <td>
                                    <div class="d-flex align-items-center">
                                        <div class="me-2">
                                            <img th:src="@{/img/default-avatar.svg}"
                                                 class="rounded-circle" width="32" height="32" alt="User Avatar">
                                        </div>
                                        <div>
                                            <div class="fw-bold" th:text="${user.fullName}">John Doe</div>
                                            <div class="small text-muted">@<span th:text="${user.username}">johndoe</span></div>
                                        </div>
                                    </div>
                                </td>
                                <td th:text="${user.email}">john@example.com</td>
                                <td>
                                    <span class="badge" 
                                          th:classappend="${user.role == 'ADMIN'} ? 'bg-danger' : 'bg-primary'"
                                          th:text="${user.role}">
                                        USER
                                    </span>
                                </td>
                                <td>
                                    <span class="badge" 
                                          th:classappend="${user.active != null && user.active} ? 'bg-success' : 'bg-secondary'"
                                          th:text="${user.active != null && user.active} ? 'Active' : 'Inactive'">
                                        Active
                                    </span>
                                </td>
                                <td th:if="${user.createdAt != null}" th:text="${#temporals.format(user.createdAt, 'MMM dd, yyyy')}">Jan 01, 2023</td>
                                <td th:if="${user.createdAt == null}" class="text-muted">-</td>
                                <td>
                                    <div class="btn-group btn-group-sm" role="group">
                                        <a th:href="@{/admin/users/{id}(id=${user.id})}" 
                                           class="btn btn-info btn-sm"
                                           data-bs-toggle="tooltip" 
                                           title="View Details">
                                            <i class="fas fa-eye"></i>
                                        </a>
                                        <a th:href="@{/admin/users/{id}/edit(id=${user.id})}" 
                                           class="btn btn-primary"
                                           data-bs-toggle="tooltip" 
                                           title="Edit">
                                            <i class="fas fa-edit"></i>
                                        </a>
                                        <button type="button" 
                                                class="btn btn-danger"
                                                data-bs-toggle="tooltip" 
                                                title="Delete"
                                                onclick="confirmDelete('@{/admin/users/{id}/delete(id=${user.id})}')">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                
                <!-- Pagination -->
                <div th:if="${totalItems > 0}">
                    <nav aria-label="Page navigation">
                        <ul class="pagination justify-content-center">
                            <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled' : ''">
                                <a class="page-link" 
                                   th:href="@{/admin/users(page=${currentPage - 1}, size=${size}, keyword=${keyword})}" 
                                   aria-label="Previous"
                                   th:if="${currentPage > 1}">
                                    <span aria-hidden="true">&laquo;</span>
                                </a>
                                <span class="page-link" th:unless="${currentPage > 1}" aria-hidden="true">&laquo;</span>
                            </li>
                            
                            <li th:each="pageNum : ${#numbers.sequence(1, totalPages)}" 
                                th:classappend="${pageNum == currentPage} ? 'active' : ''"
                                class="page-item">
                                <a class="page-link" 
                                   th:href="@{/admin/users(page=${pageNum}, size=${size}, keyword=${keyword})}"
                                   th:text="${pageNum}">1</a>
                            </li>
                            
                            <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled' : ''">
                                <a class="page-link" 
                                   th:href="@{/admin/users(page=${currentPage + 1}, size=${size}, keyword=${keyword})}" 
                                   aria-label="Next"
                                   th:if="${currentPage < totalPages}">
                                    <span aria-hidden="true">&raquo;</span>
                                </a>
                                <span class="page-link" th:unless="${currentPage < totalPages}" aria-hidden="true">&raquo;</span>
                            </li>
                        </ul>
                    </nav>
                    
                    <div class="text-muted text-center">
                        Showing <span th:text="${(currentPage - 1) * size + 1}">1</span> to 
                        <span th:with="endItem=${currentPage * size}, total=${totalItems}"
                              th:text="${endItem > total ? total : endItem}">10</span> of 
                        <span th:text="${totalItems}">100</span> entries
                    </div>
                </div>
            </div>
        </div>
    </div>

    <th:block layout:fragment="scripts">
        <script>
            // Initialize DataTable
            $(document).ready(function() {
                try {
                    if ($.fn.DataTable.isDataTable('#usersTable')) {
                        $('#usersTable').DataTable().destroy();
                    }
                    
                    $('#usersTable').DataTable({
                        paging: false,
                        info: false,
                        searching: false,
                        ordering: true,
                        responsive: true,
                        autoWidth: false
                    });
                    
                    // Enable tooltips
                    var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));
                    var tooltipList = tooltipTriggerList.map(function (tooltipTriggerEl) {
                        return new bootstrap.Tooltip(tooltipTriggerEl);
                    });
                } catch (e) {
                    console.error('Error initializing DataTable:', e);
                }
            });
            
            // Confirm before deleting
            function confirmDelete(url) {
                if (confirm('Are you sure you want to delete this user? This action cannot be undone.')) {
                    window.location.href = url;
                }
                return false;
            }
        </script>
    </th:block>
</body>
</html>
