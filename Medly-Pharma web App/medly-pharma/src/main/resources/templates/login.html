<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <title>Login - Medly Pharma</title>
    <style>
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .form-group {
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
<div layout:fragment="content">
    <div class="container">
        <div class="login-container">
            <h2 class="text-center mb-4">Login to Medly Pharma</h2>
            
            <!-- Error Message -->
            <div th:if="${param.error != null}" class="alert alert-danger">
                <i class="fas fa-exclamation-circle"></i> Invalid username or password.
            </div>
            
            <!-- Logout Message -->
            <div th:if="${param.logout != null}" class="alert alert-success">
                <i class="fas fa-check-circle"></i> You have been successfully logged out.
            </div>
            
            <!-- Session Expired -->
            <div th:if="${param.expired != null}" class="alert alert-warning">
                <i class="fas fa-exclamation-triangle"></i> Your session has expired. Please login again.
            </div>
            
            <form th:action="@{/login}" method="post" id="loginForm" th:object="${loginRequest}">
                <!-- CSRF Token -->
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                
                <!-- Debug Info (remove in production) -->
                <div th:if="${param.error != null}" class="alert alert-warning">
                    <p>Debug Info:</p>
                    <p>Error: <span th:text="${session['SPRING_SECURITY_LAST_EXCEPTION']?.message}"></span></p>
                </div>
                
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" class="form-control" id="email" name="email" required autofocus
                           placeholder="Enter your email" autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" class="form-control" id="password" name="password" required
                           placeholder="Enter your password" autocomplete="current-password">
                </div>
                <div class="form-group form-check">
                    <input type="checkbox" class="form-check-input" id="remember-me" name="remember-me">
                    <label class="form-check-label" for="remember-me">Remember me</label>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Login</button>
            </form>
            
            <div class="mt-3 text-center">
                <p>Don't have an account? <a th:href="@{/register}">Register here</a></p>
            </div>
        </div>
    </div>
</div>
</body>
</html>
