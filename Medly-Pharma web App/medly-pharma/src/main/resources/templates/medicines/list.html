<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::section}, ~{})}">
<head>
    <title>Medicines - Medly Pharma</title>
</head>
<body>
    <section th:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Our Medicines</h1>
            <div sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/admin/medicines/new}" class="btn btn-primary">
                    <i class="fas fa-plus me-1"></i> Add New Medicine
                </a>
            </div>
        </div>

        <!-- Search and Filter -->
        <div class="card mb-4">
            <div class="card-body">
                <form th:action="@{/medicines}" method="get" class="row g-3">
                    <div class="col-md-6">
                        <input type="text" name="search" class="form-control" placeholder="Search medicines..." 
                               th:value="${param.search}">
                    </div>
                    <div class="col-md-4">
                        <select name="category" class="form-select">
                            <option value="">All Categories</option>
                            <option th:each="category : ${categories}" 
                                    th:value="${category}" 
                                    th:text="${category}"
                                    th:selected="${param.category == category}">
                            </option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="fas fa-search me-1"></i> Search
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Medicines Grid -->
        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 row-cols-xl-4 g-4">
            <div class="col" th:each="medicine : ${medicines}">
                <div class="card h-100">
                    <div class="position-relative">
                        <img th:src="${medicine.imageUrl} ?: '/images/medicine-placeholder.jpg'" 
                             class="card-img-top" 
                             alt="Medicine image"
                             style="height: 200px; object-fit: cover;">
                        <span th:if="${medicine.quantityInStock == 0}" 
                              class="position-absolute top-0 start-0 bg-danger text-white px-2 py-1">Out of Stock</span>
                        <span th:if="medicine.lowStock" 
                              class="position-absolute top-0 start-0 bg-warning text-dark px-2 py-1">Low Stock</span>
                    </div>
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title" th:text="${medicine.name}">Medicine Name</h5>
                        <p class="card-text text-muted" th:text="${medicine.manufacturer}">Manufacturer</p>
                        <p class="card-text" th:text="${medicine.description}" 
                           style="display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;">
                            Medicine description goes here...
                        </p>
                        <div class="mt-auto">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <span class="h5 mb-0" th:text="'$' + ${#numbers.formatDecimal(medicine.price, 1, 2)}">$0.00</span>
                                <span class="badge bg-primary" th:text="${medicine.category}">Category</span>
                            </div>
                            <div class="d-flex justify-content-between align-items-center">
                                <span class="text-muted" th:text="'In Stock: ' + ${medicine.quantityInStock}">In Stock: 0</span>
                                <span class="text-muted" th:if="${medicine.expiryDate}" 
                                      th:text="'Exp: ' + ${#temporals.format(medicine.expiryDate, 'MM/yyyy')}">Exp: 12/2023</span>
                            </div>
                            <div class="mt-3" sec:authorize="!hasRole('ADMIN')">
                                <div class="input-group">
                                    <button class="btn btn-outline-secondary" type="button" 
                                            onclick="updateQuantity(this, -1)">-</button>
                                    <input type="number" class="form-control text-center" 
                                           value="1" min="1" max="10" 
                                           th:max="${medicine.quantityInStock}"
                                           onchange="validateQuantity(this)">
                                    <button class="btn btn-outline-secondary" type="button" 
                                            onclick="updateQuantity(this, 1)">+</button>
                                    <button class="btn btn-primary" type="button" 
                                            th:disabled="${medicine.quantityInStock == 0}"
                                            th:onclick="'addToCart(\'' + ${medicine.id} + '\', this.previousElementSibling.value)'">
                                        <i class="fas fa-cart-plus"></i> Add to Cart
                                    </button>
                                </div>
                            </div>
                            <div class="mt-2" sec:authorize="hasRole('ADMIN')">
                                <a th:href="@{'/admin/medicines/' + ${medicine.id} + '/edit'}" 
                                   class="btn btn-sm btn-outline-primary me-2">
                                    <i class="fas fa-edit"></i> Edit
                                </a>
                                <button type="button" class="btn btn-sm btn-outline-danger" 
                                        th:onclick="'deleteMedicine(\'' + ${medicine.id} + '\')'">
                                    <i class="fas fa-trash"></i> Delete
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Pagination -->
        <nav aria-label="Page navigation" class="mt-4" th:if="${totalPages > 1}">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                    <a class="page-link" th:href="@{${'?page=' + (currentPage - 1) + '&search=' + (param.search != null ? param.search : '') + '&category=' + (param.category != null ? param.category : '')}}" 
                       aria-label="Previous">
                        <span aria-hidden="true">&laquo;</span>
                    </a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}"
                    th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link" 
                       th:href="@{${'?page=' + i + '&search=' + (param.search != null ? param.search : '') + '&category=' + (param.category != null ? param.category : '')}}"
                       th:text="${i}">1</a>
                </li>
                <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                    <a class="page-link" 
                       th:href="@{${'?page=' + (currentPage + 1) + '&search=' + (param.search != null ? param.search : '') + '&category=' + (param.category != null ? param.category : '')}}" 
                       aria-label="Next">
                        <span aria-hidden="true">&raquo;</span>
                    </a>
                </li>
            </ul>
        </nav>
    </section>

    <div th:replace="fragments/scripts :: scripts">
        <script>
            function updateQuantity(button, change) {
                const input = button.parentElement.querySelector('input[type=number]');
                let value = parseInt(input.value) + change;
                const max = parseInt(input.max) || 10;
                const min = parseInt(input.min) || 1;
                
                if (value > max) value = max;
                if (value < min) value = min;
                
                input.value = value;
            }
            
            function validateQuantity(input) {
                const value = parseInt(input.value);
                const max = parseInt(input.max) || 10;
                const min = parseInt(input.min) || 1;
                
                if (isNaN(value) || value < min) input.value = min;
                if (value > max) input.value = max;
            }

        </script>
    </div>
</body>
</html>
