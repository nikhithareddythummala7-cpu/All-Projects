<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <title>Access Denied - Medly Pharma</title>
</head>
<body>
<div layout:fragment="content" class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">
            <div class="card shadow">
                <div class="card-body p-5">
                    <div class="display-4 text-danger mb-4">
                        <i class="fas fa-ban"></i>
                    </div>
                    <h1 class="h3 mb-3">Access Denied</h1>
                    <p class="lead">
                        You don't have permission to access this page.
                    </p>
                    <div class="mt-4">
                        <a th:href="@{/}" class="btn btn-primary me-2">
                            <i class="fas fa-home me-1"></i> Back to Home
                        </a>
                        <a th:href="@{
                            #authorization.expression('hasRole(''ADMIN'')') ? '/admin/dashboard' : 
                            #authorization.expression('hasRole(''USER'')') ? '/user/dashboard' : '/'
                        }" class="btn btn-outline-secondary">
                            <i class="fas fa-tachometer-alt me-1"></i> Go to Dashboard
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
