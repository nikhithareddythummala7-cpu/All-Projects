<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Restaurant - Table Booking System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body {
    background-color: #f8f9fa;
    padding: 30px 0;
    display: block !important;
}
        .restaurant-form-container {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 600px;
        }
        .form-title {
            text-align: center;
            margin-bottom: 2rem;
            color: #333;
        }
        .form-control:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
        }
        .btn-submit {
            width: 100%;
            padding: 0.75rem;
            font-size: 1.1rem;
            font-weight: 500;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: #6c757d;
        }
        .back-link:hover {
            color: #0d6efd;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="restaurant-form-container">
            <h2 class="form-title">Add Your Restaurant</h2>
            
            <!-- Error Message -->
            <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>
            
            <!-- Success Message -->
            <div class="alert alert-success" th:if="${param.success == 'restaurant_created'}">
                Restaurant added successfully! Your restaurant is pending admin approval.
            </div>
            
            <form th:action="@{/api/restaurants/add}" method="post" th:object="${restaurant}">
                <div class="mb-3">
                    <label for="name" class="form-label">Restaurant Name *</label>
                    <input type="text" class="form-control" id="name" th:field="*{name}" required>
                    <div class="invalid-feedback">Please enter your restaurant name</div>
                </div>
                
                <div class="mb-3">
                    <label for="description" class="form-label">Description</label>
                    <textarea class="form-control" id="description" th:field="*{description}" rows="3" 
                              placeholder="Tell us about your restaurant..."></textarea>
                </div>
                <div class="mb-3">
    <label for="imageUrl" class="form-label">Image URL</label>
    <input type="text" class="form-control" id="imageUrl"
           th:field="*{images}" placeholder="https://example.com/image.jpg">
</div>

                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="cuisine" class="form-label">Cuisine Type</label>
                        <input type="text" class="form-control" id="cuisine" th:field="*{cuisineType}" 
                               placeholder="e.g., Italian, Indian, Chinese">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="phone" class="form-label">Phone Number *</label>
                        <input type="tel" class="form-control" id="phone" th:field="*{phoneNumber}" required>
                        <div class="invalid-feedback">Please enter a valid phone number</div>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label for="address" class="form-label">Address *</label>
                    <input type="text" class="form-control" id="address" th:field="*{address}" required>
                    <div class="invalid-feedback">Please enter your restaurant's address</div>
                </div>
                
               
                
              <div class="row">
    <div class="col-md-6 mb-3">
        <label for="openingTime" class="form-label">Opening Time</label>
        <input type="text" class="form-control" id="openingTime"
               th:field="*{openingTime}" placeholder="9:00 AM">
    </div>

    <div class="col-md-6 mb-3">
        <label for="closingTime" class="form-label">Closing Time</label>
        <input type="text" class="form-control" id="closingTime"
               th:field="*{closingTime}" placeholder="10:00 PM">
    </div>
</div>

                
                
                <button type="submit" class="btn btn-primary btn-submit">
                    <i class="fas fa-utensils me-2"></i>Add Restaurant
                </button>
                
                <a href="/dashboard" class="back-link">
                    <i class="fas fa-arrow-left me-1"></i> Back to Dashboard
                </a>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Form validation
        (function () {
            'use strict'
            
            // Fetch all the forms we want to apply custom Bootstrap validation styles to
            var forms = document.querySelectorAll('.needs-validation')
            
            // Loop over them and prevent submission
            Array.prototype.slice.call(forms)
                .forEach(function (form) {
                    form.addEventListener('submit', function (event) {
                        if (!form.checkValidity()) {
                            event.preventDefault()
                            event.stopPropagation()
                        }
                        
                        form.classList.add('was-validated')
                    }, false)
                })
        })()
    </script>
</body>
</html>
