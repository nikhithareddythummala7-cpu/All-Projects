<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Restaurant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">Table Booking App</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/restaurant/profile">Profile</a>
                <a class="nav-link" href="/restaurant/tables">Tables</a>
                <a class="nav-link" href="/logout">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h1 class="mb-4">Add Your Restaurant</h1>

        <!-- Error Message -->
        <div id="errorAlert" class="alert alert-danger" style="display: none;" role="alert">
            <span id="errorMessage"></span>
        </div>

        <!-- Restaurant Creation Form -->
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title mb-0">Restaurant Information</h5>
                    </div>
                    <div class="card-body">
                        <form id="restaurantForm">
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="name" class="form-label">Restaurant Name *</label>
                                        <input type="text" class="form-control" id="name" required>
                                    </div>
                                    <div class="mb-3">
                                        <label for="address" class="form-label">Address *</label>
                                        <input type="text" class="form-control" id="address" required>
                                    </div>
                                    <div class="mb-3">
                                        <label for="cuisine" class="form-label">Cuisine Type</label>
                                        <input type="text" class="form-control" id="cuisine" placeholder="e.g., Italian, Chinese, Mexican">
                                    </div>
                                    <div class="mb-3">
                                        <label for="phoneNumber" class="form-label">Phone Number *</label>
                                        <input type="tel" class="form-control" id="phoneNumber" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="openingTime" class="form-label">Opening Time</label>
                                        <input type="time" class="form-control" id="openingTime">
                                    </div>
                                    <div class="mb-3">
                                        <label for="closingTime" class="form-label">Closing Time</label>
                                        <input type="time" class="form-control" id="closingTime">
                                    </div>
                                    <div class="mb-3">
                                        <label for="priceRange" class="form-label">Price Range</label>
                                        <select class="form-control" id="priceRange">
                                            <option value="1">$ - Budget friendly</option>
                                            <option value="2">$$ - Moderate</option>
                                            <option value="3">$$$ - Expensive</option>
                                            <option value="4">$$$$ - Very expensive</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="description" class="form-label">Description</label>
                                <textarea class="form-control" id="description" rows="4" placeholder="Tell customers about your restaurant..."></textarea>
                            </div>
                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-success">Create Restaurant</button>
                                <button type="button" id="cancelBtn" class="btn btn-secondary">Cancel</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('restaurantForm');
            const cancelBtn = document.getElementById('cancelBtn');

            // Cancel button - redirect to profile or dashboard
            cancelBtn.addEventListener('click', function() {
                window.location.href = '/restaurant/profile';
            });

            // Form submission
            form.addEventListener('submit', function(e) {
                e.preventDefault();

                const restaurantData = {
                    name: document.getElementById('name').value.trim(),
                    address: document.getElementById('address').value.trim(),
                    cuisine: document.getElementById('cuisine').value.trim(),
                    phoneNumber: document.getElementById('phoneNumber').value.trim(),
                    openingTime: document.getElementById('openingTime').value,
                    closingTime: document.getElementById('closingTime').value,
                    priceRange: parseInt(document.getElementById('priceRange').value),
                    description: document.getElementById('description').value.trim()
                };

                // Basic client-side validation
                if (!restaurantData.name || !restaurantData.address || !restaurantData.phoneNumber) {
                    showError('Please fill in all required fields.');
                    return;
                }

                // Disable submit button during submission
                const submitBtn = form.querySelector('button[type="submit"]');
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status"></span> Creating...';

                fetch('/api/restaurants', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(restaurantData)
                })
                .then(response => {
                    if (response.ok) {
                        return response.json();
                    } else {
                        return response.json().then(data => {
                            throw new Error(data.error || data.message || 'Creation failed');
                        });
                    }
                })
                .then(data => {
                    // Show success message and redirect
                    showSuccessAlert('Restaurant created successfully! Redirecting to your profile...');
                    setTimeout(() => {
                        window.location.href = '/restaurant/profile';
                    }, 2000);
                })
                .catch(error => {
                    console.error('Error creating restaurant:', error);
                    showError(error.message || 'Failed to create restaurant. Please try again.');
                    // Re-enable submit button
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = 'Create Restaurant';
                });
            });
        });

        function showSuccessAlert(message) {
            const alertDiv = document.createElement('div');
            alertDiv.className = 'alert alert-success alert-dismissible fade show';
            alertDiv.innerHTML = `
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            document.querySelector('.container').insertBefore(alertDiv, document.querySelector('.container').firstChild.nextSibling);
        }

        function showError(message) {
            const errorAlert = document.getElementById('errorAlert');
            document.getElementById('errorMessage').textContent = message;
            errorAlert.style.display = 'block';
            errorAlert.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
