<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Tables - Owner Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="/css/style.css" rel="stylesheet">
    <link href="/css/owner.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="/owner/bookings">
                <i class="fas fa-utensils"></i> Restaurant Manager
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/owner/bookings">
                            <i class="fas fa-calendar-check"></i> Bookings
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/owner/tables">
                            <i class="fas fa-chair"></i> Tables
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/owner/profile">
                            <i class="fas fa-store"></i> Profile
                        </a>
                    </li>
                    <li class="nav-item">
                        <form action="/logout" method="post" class="d-inline">
                            <button class="nav-link btn btn-link" type="submit">
                                <i class="fas fa-sign-out-alt"></i> Logout
                            </button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="page-container">
        <div class="container">
            <!-- Page Header -->
            <div class="page-header" style="margin-top: 2rem;">
                <div>
                    <h1 class="page-title"><i class="fas fa-chair"></i> Restaurant Tables</h1>
                    <p class="page-subtitle">Manage your restaurant's seating arrangement</p>
                </div>
            </div>

            <input type="hidden" id="restaurantId" th:value="${restaurant.id}">

            <!-- Loading State -->
            <div id="loading" class="text-center py-5">
                <div class="spinner-border mb-3" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p class="text-white fs-5">Loading tables...</p>
            </div>

            <!-- Tables Container -->
            <div id="tables-container" style="display: none;">
                <!-- Error Alert -->
                <div id="error-message" class="alert alert-danger" style="display: none;"></div>

                <!-- Add Button -->
                <div style="margin-bottom: 2rem;">
                    <button class="btn btn-primary btn-lg" onclick="showAddTableModal()">
                        <i class="fas fa-plus"></i> Add New Table
                    </button>
                </div>

                <!-- Tables Grid -->
                <div id="tables-list" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem;"></div>

                <!-- Empty State -->
                <div id="empty-state" class="empty-state" style="display:none">
                    <div class="empty-state-icon">
                        <i class="fas fa-chair"></i>
                    </div>
                    <h3 class="empty-state-title">No tables found</h3>
                    <p class="empty-state-text">Start by adding your first table</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Table Modal -->
    <div class="modal fade" id="addTableModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-plus"></i> Add New Table</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addTableForm">
                        <div class="mb-3">
                            <label for="tableNumber" class="form-label">Table Number *</label>
                            <input type="number" class="form-control" id="tableNumber" required placeholder="e.g., 1, 2, 3">
                        </div>
                        <div class="mb-3">
                            <label for="capacity" class="form-label">Capacity (Persons) *</label>
                            <input type="number" class="form-control" id="capacity" required placeholder="e.g., 2, 4, 6">
                        </div>
                        <div class="mb-3">
                            <label for="location" class="form-label">Location</label>
                            <input type="text" class="form-control" id="location" placeholder="e.g., Window, Center, Patio">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="addTable()"><i class="fas fa-check"></i> Add Table</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Table Modal -->
    <div class="modal fade" id="editTableModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-edit"></i> Edit Table</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="editTableForm">
                        <input type="hidden" id="editTableId">
                        <div class="mb-3">
                            <label for="editTableNumber" class="form-label">Table Number *</label>
                            <input type="number" class="form-control" id="editTableNumber" required>
                        </div>
                        <div class="mb-3">
                            <label for="editCapacity" class="form-label">Capacity (Persons) *</label>
                            <input type="number" class="form-control" id="editCapacity" required>
                        </div>
                        <div class="mb-3">
                            <label for="editLocation" class="form-label">Location</label>
                            <input type="text" class="form-control" id="editLocation" placeholder="e.g., Window, Center, Patio">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="updateTable()"><i class="fas fa-save"></i> Update Table</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let allTables = [];

        function getRestaurantId() {
            return document.getElementById("restaurantId").value;
        }

        document.addEventListener('DOMContentLoaded', function() {
            loadTables();
        });

        async function loadTables() {
            try {
                const response = await fetch('/api/restaurants/' + getRestaurantId() + '/tables', {
                    method: 'GET',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin'
                });

                if (response.ok) {
                    allTables = await response.json();
                    displayTables(allTables);
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('tables-container').style.display = 'block';
                } else {
                    const errorData = await response.json();
                    showError('Failed to load tables: ' + (errorData.message || 'Unknown error'));
                }
            } catch (error) {
                console.error('Error loading tables:', error);
                showError('Error loading tables. Please try again.');
            }
        }

        function displayTables(tables) {
            const container = document.getElementById('tables-list');
            const emptyState = document.getElementById('empty-state');
            container.innerHTML = '';

            if (tables.length === 0) {
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';
            tables.forEach(table => {
                container.innerHTML += createTableCard(table);
            });
        }

        function createTableCard(table) {
            const statusClass = table.available ? 'available' : 'occupied';
            const statusIcon = table.available ? 'check-circle' : 'times-circle';
            const statusText = table.available ? 'Available' : 'Occupied';

            return `
                <div class="table-card">
                    <div class="table-number">Table ${table.tableNumber}</div>
                    <div class="table-info">
                        <div class="table-info-item">
                            <i class="fas fa-users"></i>
                            <span><strong>Capacity:</strong> ${table.capacity} guests</span>
                        </div>
                        <div class="table-info-item">
                            <i class="fas fa-map-marker-alt"></i>
                            <span><strong>Location:</strong> ${table.location || 'Not specified'}</span>
                        </div>
                    </div>
                    <span class="table-status ${statusClass}">
                        <i class="fas fa-${statusIcon}"></i> ${statusText}
                    </span>
                    <div class="booking-actions" style="margin-top: 1.5rem;">
                        <button class="btn btn-primary btn-sm" onclick="editTable('${table.id}', ${table.tableNumber}, ${table.capacity}, '${table.location || ''}')">
                            <i class="fas fa-edit"></i> Edit
                        </button>
                        <button class="btn btn-danger btn-sm" onclick="deleteTable('${table.id}')">
                            <i class="fas fa-trash"></i> Delete
                        </button>
                    </div>
                </div>
            `;
        }

        function showAddTableModal() {
            document.getElementById('addTableForm').reset();
            new bootstrap.Modal(document.getElementById('addTableModal')).show();
        }

        async function addTable() {
            const tableNumber = document.getElementById('tableNumber').value;
            const capacity = document.getElementById('capacity').value;
            const location = document.getElementById('location').value;

            if (!tableNumber || !capacity) {
                alert('Please fill in all required fields.');
                return;
            }

            const tableData = {
                tableNumber: parseInt(tableNumber),
                capacity: parseInt(capacity),
                location: location,
                available: true
            };

            try {
                const response = await fetch('/api/restaurants/' + getRestaurantId() + '/tables', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: JSON.stringify(tableData)
                });

                if (response.ok) {
                    bootstrap.Modal.getInstance(document.getElementById('addTableModal')).hide();
                    loadTables();
                } else {
                    const errorData = await response.json();
                    alert('Failed to add table: ' + (errorData.message || 'Unknown error'));
                }
            } catch (error) {
                console.error('Error adding table:', error);
                alert('Error adding table. Please try again.');
            }
        }

        function editTable(id, tableNumber, capacity, location) {
            document.getElementById('editTableId').value = id;
            document.getElementById('editTableNumber').value = tableNumber;
            document.getElementById('editCapacity').value = capacity;
            document.getElementById('editLocation').value = location;
            new bootstrap.Modal(document.getElementById('editTableModal')).show();
        }

        async function updateTable() {
            const id = document.getElementById('editTableId').value;
            const tableNumber = document.getElementById('editTableNumber').value;
            const capacity = document.getElementById('editCapacity').value;
            const location = document.getElementById('editLocation').value;

            if (!tableNumber || !capacity) {
                alert('Please fill in all required fields.');
                return;
            }

            const tableData = {
                tableNumber: parseInt(tableNumber),
                capacity: parseInt(capacity),
                location: location
            };

            try {
                const response = await fetch('/api/restaurants/' + getRestaurantId() + '/tables/' + id, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: JSON.stringify(tableData)
                });

                if (response.ok) {
                    bootstrap.Modal.getInstance(document.getElementById('editTableModal')).hide();
                    loadTables();
                } else {
                    const errorData = await response.json();
                    alert('Failed to update table: ' + (errorData.message || 'Unknown error'));
                }
            } catch (error) {
                console.error('Error updating table:', error);
                alert('Error updating table. Please try again.');
            }
        }

        async function deleteTable(id) {
            if (!confirm('Are you sure you want to delete this table?')) {
                return;
            }

            try {
                const response = await fetch('/api/restaurants/' + getRestaurantId() + '/tables/' + id, {
                    method: 'DELETE',
                    credentials: 'same-origin'
                });

                if (response.ok) {
                    loadTables();
                } else {
                    const errorData = await response.json();
                    alert('Failed to delete table: ' + (errorData.message || 'Unknown error'));
                }
            } catch (error) {
                console.error('Error deleting table:', error);
                alert('Error deleting table. Please try again.');
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('error-message');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            document.getElementById('loading').style.display = 'none';
        }
    </script>
</body>
</html>
