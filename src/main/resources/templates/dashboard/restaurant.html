<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Restaurant Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar navbar-expand-md navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="#">Restaurant Management</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">

                <li class="nav-item">
                    <a class="nav-link" href="/owner/bookings">Bookings</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/owner/tables">Tables</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/owner/profile">Restaurant Profile</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/owner/reviews">Reviews</a>
                </li>
            </ul>

            <form th:action="@{/logout}" method="post" class="d-flex">
                <button class="btn btn-outline-light" type="submit">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <div id="loading" class="text-center">
        <div class="spinner-border" role="status"></div>
        <p>Loading dashboard data...</p>
    </div>

    <div id="dashboard-content" style="display: none;">
        
        <h2 id="restaurant-name">Welcome to Restaurant Dashboard!</h2>

        <div class="row mt-4">

            <!-- TODAY BOOKINGS -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Today's Bookings</h5>
                        <div id="today-bookings">
                            <p class="text-center">Loading bookings...</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- STATS -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Quick Stats</h5>
                        <div class="row text-center">
                            <div class="col-6 mb-3">
                                <h3 id="totalBookings">0</h3>
                                <p class="text-muted">Total Bookings</p>
                            </div>

                            <div class="col-6 mb-3">
                                <h3 id="availableTables">0</h3>
                                <p class="text-muted">Available Tables</p>
                            </div>

                            <div class="col-6">
                                <h3 id="averageRating">0.0</h3>
                                <p class="text-muted">Average Rating</p>
                            </div>

                            <div class="col-6">
                                <h3 id="totalReviews">0</h3>
                                <p class="text-muted">Total Reviews</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

async function loadDashboardData() {
    const jwt = localStorage.getItem('jwtToken');
    if (!jwt) {
        window.location.href = '/login';
        return;
    }

    try {
        const response = await fetch('/api/dashboard/restaurant/stats', {
            headers: { 'Authorization': 'Bearer ' + jwt }
        });

        const data = await response.json();

        document.getElementById("totalBookings").textContent = data.totalBookings;
        document.getElementById("availableTables").textContent = data.availableTables;
        document.getElementById("averageRating").textContent = data.averageRating;
        document.getElementById("totalReviews").textContent = data.totalReviews;

        loadTodayBookings();

        document.getElementById('loading').style.display = 'none';
        document.getElementById('dashboard-content').style.display = 'block';

    } catch (err) {
        console.log(err);
        alert("Unable to load dashboard");
    }
}

async function loadTodayBookings() {
    const jwt = localStorage.getItem('jwtToken');

    const res = await fetch('/api/dashboard/restaurant/today-bookings', {
        headers: { "Authorization": "Bearer " + jwt }
    });

    const bookings = await res.json();
    const container = document.getElementById("today-bookings");

    if (!bookings.length) {
        container.innerHTML = '<p class="text-center text-muted">No bookings today</p>';
        return;
    }

    let html = `
        <table class="table table-sm table-bordered">
            <thead>
                <tr>
                    <th>Customer</th>
                    <th>Time</th>
                    <th>Table</th>
                    <th>Guests</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
    `;

    bookings.forEach(b => {
        const time = new Date(b.bookingTime).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

        html += `
            <tr>
                <td>${b.customerName || "Guest"}</td>
                <td>${time}</td>
                <td>${b.tableNumber}</td>
                <td>${b.numberOfGuests}</td>

                <td>
                    <span class="badge ${b.status === 'CONFIRMED' ? 'bg-success' : 'bg-warning'}">
                        ${b.status}
                    </span>
                </td>

                <td>
                    ${
                        b.status === 'PENDING'
                        ? `<button class="btn btn-success btn-sm" onclick="confirmBooking('${b.id}')">Confirm</button>`
                        : `<button class="btn btn-danger btn-sm" onclick="cancelBooking('${b.id}')">Cancel</button>`
                    }
                </td>
            </tr>
        `;
    });

    html += "</tbody></table>";
    container.innerHTML = html;
}

async function confirmBooking(id) {
    const jwt = localStorage.getItem('jwtToken');
    await fetch(`/api/bookings/${id}/confirm`, {
        method: "PUT",
        headers: { "Authorization": "Bearer " + jwt }
    });
    loadTodayBookings();
}

async function cancelBooking(id) {
    const jwt = localStorage.getItem('jwtToken');
    await fetch(`/api/bookings/${id}/cancel`, {
        method: "PUT",
        headers: { "Authorization": "Bearer " + jwt }
    });
    loadTodayBookings();
}

document.addEventListener("DOMContentLoaded", loadDashboardData);

</script>

</body>
</html>
