<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Booking - Home</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/modern-design.css}">
    <link rel="stylesheet" th:href="@{/css/modern-buttons.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header>
        <nav class="nav-container">
            <h1><i class="fas fa-utensils"></i> Table Booking</h1>
            <div class="nav-links">
                <a th:href="@{/login}"><i class="fas fa-sign-in-alt"></i> Login</a>
                <a th:href="@{/register}"><i class="fas fa-user-plus"></i> Register</a>
                <a th:href="@{/button-showcase}"><i class="fas fa-palette"></i> Showcase</a>
            </div>
        </nav>
    </header>

    <main>
        <section class="hero">
            <div class="hero-content">
                <h2>🍽️ Find and Book Your Perfect Table</h2>
                <p>Discover the best restaurants in your area and reserve your table instantly.</p>
                <div class="search-container">
                    <input type="text" placeholder="Search restaurants, cuisine, location..." id="searchInput">
                    <button class="btn-modern btn-modern-success" onclick="searchRestaurants()">
                        <i class="fas fa-search"></i> Search
                    </button>
                </div>
            </div>
        </section>

        <section class="featured-restaurants">
            <h3>✨ Featured Restaurants</h3>
            <div class="restaurant-grid" id="restaurantGrid">
                <!-- Restaurants will be loaded here -->
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 Table Booking. All rights reserved. | Built with 💙 for food lovers</p>
    </footer>

    <script th:src="@{/js/main.js}"></script>
    <script th:src="@{/js/restaurant.js}"></script>
</body>
</html>
