<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Booking - Table Booking</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header>
        <nav>
            <div class="nav-container">
                <h1>Table Booking</h1>
                <div class="nav-links">
                    <a th:href="@{/}">Home</a>
                    <a th:href="@{/api/bookings/restaurants}">Restaurants</a>
                    <a th:href="@{/dashboard}">Dashboard</a>
                    <a th:href="@{/logout}">Logout</a>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <section class="create-booking">
            <h2>Create Booking</h2>
            <form th:action="@{/api/bookings/book}" method="post" th:object="${booking}">
                <div class="form-group">
                    <label for="restaurantId">Restaurant:</label>
                    <select id="restaurantId" name="restaurantId" th:field="*{restaurantId}" required>
                        <option value="">Select Restaurant</option>
                        <option th:each="restaurant : ${restaurants}" th:value="${restaurant.id}" th:text="${restaurant.name}">Restaurant Name</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="tableId">Table:</label>
                    <select id="tableId" name="tableId" th:field="*{tableId}" required>
                        <option value="">Select Table</option>
                        <!-- Tables will be loaded via JavaScript -->
                    </select>
                </div>
                <div class="form-group">
                    <label for="bookingTime">Booking Time:</label>
                    <input type="datetime-local" id="bookingTime" name="bookingTime" th:field="*{bookingTime}" required>
                </div>
                <div class="form-group">
                    <label for="numberOfGuests">Number of Guests:</label>
                    <input type="number" id="numberOfGuests" name="numberOfGuests" th:field="*{numberOfGuests}" min="1" required>
                </div>
                <button type="submit" class="btn-primary">Book Table</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 Table Booking. All rights reserved.</p>
    </footer>

    <script th:src="@{/js/main.js}"></script>
    <script th:src="@{/js/booking.js}"></script>
</body>
</html>
