<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Guest Navbar</title>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-light">

            <a class="navbar-brand" href="/">Flower & Gift</a>

                    <li class="nav-item">
                        <a class="nav-link" href="/products/list">Products</a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/login">Login</a>
                    </li>
                    <li class="nav-item">

                </ul>

    </nav>
</div>

</html>
