<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Addresses</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header>
        <h1>Manage Addresses</h1>
        <nav>
            <a th:href="@{/}">Home</a>
            <a th:href="@{/products}">Products</a>
            <a th:href="@{/cart}">Cart</a>
            <a th:href="@{/orders}">Orders</a>
            <a th:href="@{/user/profile}">Profile</a>
            <a th:href="@{/admin}" sec:authorize="hasRole('ADMIN')">Admin</a>
            <a th:href="@{/login}" sec:authorize="!isAuthenticated()">Login</a>
            <a th:href="@{/logout}" sec:authorize="isAuthenticated()">Logout</a>
        </nav>
    </header>
    <main>
        <section class="address-management">
            <h2>Your Addresses</h2>
            <div th:each="address, iterStat : ${addresses}" class="address-card">
                <p><strong>Address <span th:text="${iterStat.index + 1}"></span>:</strong></p>
                <p th:text="${address.street}"></p>
                <p th:text="${address.city} + ', ' + ${address.state} + ' ' + ${address.zipCode}"></p>
                <p th:text="${address.country}"></p>
                <form th:action="@{/user/addresses}" method="post" style="display: inline;">
                    <input type="hidden" name="index" th:value="${iterStat.index}">
                    <button type="submit">Edit</button>
                </form>
            </div>
            <h3>Add/Edit Address</h3>
            <form th:action="@{/user/addresses}" method="post">
                <input type="hidden" name="index" th:value="${addressIndex}">
                <div>
                    <label for="street">Street:</label>
                    <input type="text" id="street" name="street" th:value="${address.street}" required>
                </div>
                <div>
                    <label for="city">City:</label>
                    <input type="text" id="city" name="city" th:value="${address.city}" required>
                </div>
                <div>
                    <label for="state">State:</label>
                    <input type="text" id="state" name="state" th:value="${address.state}" required>
                </div>
                <div>
                    <label for="zipCode">Zip Code:</label>
                    <input type="text" id="zipCode" name="zipCode" th:value="${address.zipCode}" required>
                </div>
                <div>
                    <label for="country">Country:</label>
                    <input type="text" id="country" name="country" th:value="${address.country}" required>
                </div>
                <button type="submit" th:text="${addressIndex != null} ? 'Update Address' : 'Add Address'"></button>
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2025 BlossomLane • Fresh flowers, warm smiles.</p>
    </footer>
    <script th:src="@{/js/script.js}"></script>
</body>
</html>
