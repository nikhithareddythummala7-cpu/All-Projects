<svg width="200" height="60" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
    <!-- Background Circle with Gradient -->
    <defs>
        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#2196F3;stop-opacity:1" />
        </linearGradient>
    </defs>
    <circle cx="30" cy="30" r="25" fill="url(#grad1)" />

    <!-- Contact Icon (Person) -->
    <circle cx="30" cy="22" r="6" fill="white" />
    <path d="M24,36 a6,6 0 1,1 12,0" fill="white" />

    <!-- Connecting Dots to symbolize "Smart" -->
    <circle cx="70" cy="15" r="4" fill="#4CAF50" />
    <circle cx="70" cy="45" r="4" fill="#2196F3" />
    <line x1="30" y1="30" x2="70" y2="15" stroke="#4CAF50" stroke-width="2"/>
    <line x1="30" y1="30" x2="70" y2="45" stroke="#2196F3" stroke-width="2"/>

    <!-- Text: Smart Contact Manager -->
    <text x="85" y="35" font-size="20" fill="#333333" font-family="Arial" font-weight="bold">SCM</text>
    <text x="85" y="50" font-size="10" fill="#333333" font-family="Arial">Smart Contact Manager</text>
</svg>
