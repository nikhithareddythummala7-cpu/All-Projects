<div data-th-fragment="contact">
    <!-- Modal -->
    <div class="modal fade" id="view_contact_modal" tabindex="-1" role="dialog" aria-labelledby="exampleModalCenterTitle" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered" role="document">
            <div class="modal-content">
                <!-- Header -->
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title" id="exampleModalLongTitle">Contact Details</h5>
                    <a onclick="closeContactModal()" type="button" class="close text-white" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </a>
                </div>

                <!-- Body -->
                <div class="modal-body text-center">
                    <img id="contact_image"
                         onerror="this.src='https://e7.pngegg.com/pngimages/81/570/png-clipart-profile-logo-computer-icons-user-user-blue-heroes-thumbnail.png'"
                         alt="Avatar"
                         class="rounded-circle img-fluid mb-3 border border-primary shadow"
                         width="90" height="90">
                    <h5 id="contact_name" class="fw-bold text-primary mb-1"></h5>

                    <!-- Contact Info with Icons -->
                    <div class="d-flex align-items-center justify-content-center mb-2">
                        <i class="fa-solid fa-envelope text-primary me-2"></i>
                        <p id="contact_email" class="text-muted mb-0"></p>
                    </div>
                    <div class="d-flex align-items-center justify-content-center mb-2">
                        <i class="fa-solid fa-phone text-primary me-2"></i>
                        <p id="contact_phone" class="text-muted mb-0"></p>
                    </div>

                    <!-- Additional Information -->
                    <table class="table table-borderless mt-3">
                        <tbody>
                        <tr>
                            <td class="text-primary"><i class="fa-solid fa-location-dot"></i></td>
                            <td><p id="contact_address" class="text-muted mb-0"></p></td>
                        </tr>
                        <tr>
                            <td class="text-primary"><i class="fa-solid fa-user"></i></td>
                            <td><p id="contact_about" class="text-muted mb-0"></p></td>
                        </tr>
                        <tr>
                            <td class="text-danger"><i class="fa-regular fa-heart"></i></td>
                            <td><span id="contact_favorite" class="text-muted"></span></td>
                        </tr>
                        <tr>
                            <td class="text-primary"><i class="fa-solid fa-earth-americas"></i></td>
                            <td><a id="contact_website" target="_blank" class="text-decoration-none text-primary"></a></td>
                        </tr>
                        <tr>
                            <td class="text-primary"><i class="fa-brands fa-linkedin-in"></i></td>
                            <td><a id="contact_linkedIn" target="_blank" class="text-decoration-none text-primary"></a></td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Footer -->
                <div class="modal-footer d-flex justify-content-center">
                    <button onclick="closeContactModal()" type="button" class="btn btn-outline-danger w-50" data-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>
</div>
