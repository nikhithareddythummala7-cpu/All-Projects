<!DOCTYPE html>
<html lang="en" data-th-replace="~{base :: parent(~{::#content},~{::title},~{::script})}">
<head>
    <title data-th-text="${loggedInUser.name} + ' | Add Contact | SCM'">Add Contact Page</title>
</head>
<body>

<div id="content" class="container-fluid">
    <div class="container-fluid">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title fw-semibold mb-4">Add New Contact</h5>
                <div class="card">
                    <div class="card-body">
                        <div data-th-replace="~{message :: messagebox}"></div>
                        <form data-th-action="@{'/user/contacts/add'}" method="post" data-th-object="${contactForm}" enctype="multipart/form-data" novalidate>
                            <div class="row">
                                <div class="col-md-4">
                                    <div class="mb-3">
                                        <label for="name" class="form-label">Contact Name</label>
                                        <input data-th-field="*{name}" type="text" class="form-control" id="name" aria-describedby="textHelp" placeholder="Name">
                                        <div data-th-if="${#fields.hasErrors('name')}"  data-th-errors="*{name}" class="form-text text-danger"></div>
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="mb-3">
                                        <label for="email" class="form-label">Contact Email</label>
                                        <input data-th-field="*{email}" type="email" class="form-control" id="email" aria-describedby="textHelp" placeholder="example@gmail.com">
                                        <div data-th-if="${#fields.hasErrors('email')}"  data-th-errors="*{email}" class="form-text text-danger"></div>
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="mb-3">
                                        <label for="phoneNumber" class="form-label">Contact Number</label>
                                        <input data-th-field="*{phoneNumber}" type="text" class="form-control" id="phoneNumber" aria-describedby="textHelp" placeholder="9823525525">
                                        <div data-th-if="${#fields.hasErrors('phoneNumber')}"  data-th-errors="*{phoneNumber}" class="form-text text-danger"></div>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="address" class="form-label">Contact Address</label>
                                        <textarea data-th-field="*{address}" class="form-control" id="address" name="feedbackContent" rows="5" placeholder="Address of the contact"></textarea>
                                        <div data-th-if="${#fields.hasErrors('address')}"  data-th-errors="*{address}" class="form-text text-danger"></div>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="description" class="form-label">Contact Description</label>
                                        <textarea data-th-field="*{description}" class="form-control" id="description" name="feedbackContent" rows="5" placeholder="Write about your contact"></textarea>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="websiteLink" class="form-label">Website Link</label>
                                        <input data-th-field="*{websiteLink}" type="text" class="form-control" id="websiteLink" aria-describedby="textHelp" placeholder="https://www.facebook.com/">
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="linkedInLink" class="form-label">Linkedin Link</label>
                                        <input data-th-field="*{linkedInLink}" type="text" class="form-control" id="linkedInLink" aria-describedby="textHelp" placeholder="https://www.linkedin.com//">
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-12">
                                    <div class="mb-3">
                                        <label for="image_file_input" class="form-label">Contact Image</label>
                                        <input data-th-field="*{contactImage}" class="form-control" type="file" id="image_file_input" onchange="previewImage(event)">
                                        <div data-th-if="${#fields.hasErrors('contactImage')}"  data-th-errors="*{contactImage}" class="form-text text-danger"></div>
                                        <div class="d-flex justify-content-center">
                                            <img src="" id="upload_image_preview" alt="Contact Image Preview" class="img-fluid rounded d-none mt-2" width="300" height="300">
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-12">
                                    <div class="form-check mt-2 mb-3">
                                        <input data-th-field="*{favorite}" class="form-check-input" type="checkbox" id="favorite">
                                        <label class="form-check-label" for="favorite">
                                            <span class="text-dark"><b>Is this contact is your favourite one?</b></span>
                                        </label>
                                    </div>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary">Add Contact</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script data-th-src="@{'/js/admin.js'}"></script>
</body>
</html>
