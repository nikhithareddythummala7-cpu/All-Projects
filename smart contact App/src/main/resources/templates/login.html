<!DOCTYPE html>
<html lang="en" data-th-replace="~{base :: parent(~{::#content},~{::title},~{})}">
<head>
    <title>Login</title>
</head>
<body>
<section id="content">

    <!--  Body Wrapper -->
    <div class="page-wrapper" id="main-wrapper" data-layout="vertical" data-navbarbg="skin6" data-sidebartype="full"
         data-sidebar-position="fixed" data-header-position="fixed">
        <div class="position-relative overflow-hidden radial-gradient min-vh-100 d-flex align-items-center justify-content-center">
            <div class="d-flex align-items-center justify-content-center w-100">
                <div class="row justify-content-center w-100">
                    <div class="col-md-8 col-lg-6 col-xxl-4">
                        <div class="card mb-0">
                            <div class="card-body">
                                <p class="text-center">Login</p>
                                <div class="text-danger text-center mb-3" data-th-if="${param.error}">
                                    Invalid username and password.
                                </div>
                                <div class="text-success text-center mb-3" data-th-if="${param.logout}">
                                    You have been logged out.
                                </div>
                                <form data-th-action="@{'/authenticate'}" method="post">
                                    <div class="mb-3">
                                        <label for="email" class="form-label">Username</label>
                                        <input name="email" type="email" class="form-control" id="email" aria-describedby="emailHelp">
                                    </div>
                                    <div class="mb-4">
                                        <label for="password" class="form-label">Password</label>
                                        <input name="password" type="password" class="form-control" id="password">
                                    </div>
                                    <button type="submit" class="btn btn-primary w-100 py-8 fs-4 mb-4 rounded-2">Sign In</button>
                                </form>
                                <!-- New Login with Google and GitHub Buttons -->
                                <div class="row">
                                    <div class="col-md-6">
                                        <a data-th-href="@{'/oauth2/authorization/google'}" class="btn btn-outline-danger w-100 py-2 fs-3 rounded-2">
                                            <i class="fab fa-google me-2"></i> Login with Google
                                        </a>
                                    </div>
                                    <div class="col-md-6">
                                        <a data-th-href="@{'/oauth2/authorization/github'}" class="btn btn-outline-dark w-100 py-2 fs-3 rounded-2">
                                            <i class="fab fa-github me-2"></i> Login with GitHub
                                        </a>
                                    </div>
                                </div>
                                <div class="d-flex align-items-center justify-content-center mt-4">
                                    <p class="fs-4 mb-0 fw-bold">Don't have an account?</p>
                                    <a class="text-primary fw-bold ms-2" data-th-href="@{'/register'}">Sign Up</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</section>
</body>
</html>
