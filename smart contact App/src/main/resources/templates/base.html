<!DOCTYPE html>
<html lang="en" th:fragment="parent(content,title,script)" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-th-replace="${title}">Base Page</title>
    <link rel="shortcut icon" type="image/png" data-th-href="@{'/images/logos/scm.png'}" />
    <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">-->
    <link rel="stylesheet" data-th-href="@{'/css/styles.min.css'}" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-sweetalert/1.0.1/sweetalert.css" integrity="sha512-f8gN/IhfI+0E9Fc/LKtjVq4ywfhYAVeMGKsECzDUHcFJ5teVwvKTqizm+5a84FINhfrgdvjX8hEJbem2io1iTA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="page-wrapper" id="main-wrapper" data-layout="vertical" data-navbarbg="skin6" data-sidebartype="full"
     data-sidebar-position="fixed" data-header-position="fixed">

        <!-- Sidebar -->
        <div data-th-if="${loggedInUser}">
            <div data-th-replace="~{user/sidebar :: sidebar}"></div>
            <div class="body-wrapper">
                <div data-th-replace="~{user/user_navbar :: user-navbar}"></div>
                <div data-th-replace="${content}"></div>
            </div>
        </div>

        <div data-th-unless="${loggedInUser}">
            <div data-th-replace="~{navbar :: navbar}"></div>
            <div data-th-replace="${content}"></div>
        </div>

    </div>


    <script data-th-src="@{'/libs/jquery/dist/jquery.min.js'}"></script>
    <script data-th-src="@{'/libs/bootstrap/dist/js/bootstrap.bundle.min.js'}"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-sweetalert/1.0.1/sweetalert.min.js" integrity="sha512-MqEDqB7me8klOYxXXQlB4LaNf9V9S0+sG1i8LtPOYmHqICuEZ9ZLbyV3qIfADg2UJcLyCm4fawNiFvnYbcBJ1w==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <!-- <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>-->
    <script data-th-src="@{'/js/sidebarmenu.js'}"></script>
    <script data-th-src="@{'/js/app.min.js'}"></script>
    <script data-th-src="@{'/libs/apexcharts/dist/apexcharts.min.js'}"></script>
    <script data-th-src="@{'/libs/simplebar/dist/simplebar.js'}"></script>
    <script data-th-src="@{'/js/dashboard.js'}"></script>
    <th:block data-th-replace="${script}"></th:block>
</body>
</html>
