<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Table Booking System</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/modern-design.css}">
    <link rel="stylesheet" th:href="@{/css/modern-buttons.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        
        .register-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            max-width: 600px;
            width: 100%;
        }
        
        .register-header {
            background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
            color: white;
            padding: 2.5rem 2rem;
            text-align: center;
        }
        
        .register-header h2 {
            font-size: 2rem;
            color: white;
            margin: 0;
            font-weight: 700;
        }
        
        .register-header p {
            margin: 0.5rem 0 0;
            opacity: 0.95;
            font-size: 1rem;
        }
        
        .register-body {
            padding: 2.5rem 2rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: flex;
            align-items: center;
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: #212529;
        }
        
        .form-group label i {
            margin-right: 0.5rem;
            color: #007bff;
            font-size: 1.1rem;
        }
        
        .form-control {
            padding: 12px 16px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s ease;
        }
        
        .form-control:focus {
            border-color: #007bff;
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.1);
        }
        
        .role-selection {
            margin-bottom: 1.5rem;
        }
        
        .role-selection .form-label {
            margin-bottom: 1rem;
        }
        
        .role-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        
        .role-btn {
            position: relative;
            padding: 1.5rem;
            border: 2px solid #e9ecef;
            background: white;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }
        
        .role-btn:hover {
            border-color: #007bff;
            background-color: #f8f9fa;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 123, 255, 0.15);
        }
        
        .role-btn input[type="radio"] {
            display: none;
        }
        
        .role-btn input[type="radio"]:checked + .role-content {
            color: white;
        }
        
        .role-btn input[type="radio"]:checked ~ .checkmark {
            display: flex;
        }
        
        .role-btn.active {
            border-color: #007bff;
            background: linear-gradient(135deg, rgba(0, 123, 255, 0.1) 0%, rgba(0, 123, 255, 0.05) 100%);
            box-shadow: 0 4px 16px rgba(0, 123, 255, 0.2);
        }
        
        .role-icon {
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
            color: #007bff;
            transition: all 0.3s ease;
        }
        
        .role-btn.active .role-icon {
            color: #0056b3;
            transform: scale(1.1);
        }
        
        .role-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }
        
        .role-desc {
            font-size: 0.85rem;
            color: #6c757d;
            margin: 0;
        }
        
        .checkmark {
            display: none;
            position: absolute;
            top: 12px;
            right: 12px;
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
            border-radius: 50%;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
        }
        
        .alert {
            border-radius: 8px;
            margin-bottom: 1.5rem;
            border: none;
        }
        
        .alert-danger {
            background: #f8d7da;
            color: #721c24;
        }
        
        .register-button {
            width: 100%;
            margin-top: 1.5rem;
        }
        
        .register-footer {
            text-align: center;
            padding: 1.5rem 2rem;
            background: #f8f9fa;
            border-top: 1px solid #e9ecef;
        }
        
        .register-footer p {
            margin: 0;
            color: #6c757d;
            font-size: 0.95rem;
        }
        
        .register-footer a {
            color: #007bff;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        
        .register-footer a:hover {
            color: #0056b3;
            text-decoration: underline;
        }
        
        .back-link {
            text-align: center;
            margin-top: 2rem;
        }
        
        .back-link a {
            color: white;
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }
        
        .back-link a:hover {
            transform: translateX(-4px);
        }
        
        @media (max-width: 480px) {
            .role-buttons {
                grid-template-columns: 1fr;
            }
            
            .register-header h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-header">
            <h2><i class="fas fa-user-plus"></i> Create Account</h2>
            <p>Join our table booking platform today</p>
        </div>

        <div class="register-body">
            <form th:action="@{/register}" method="post" th:object="${user}">
                <div class="alert alert-danger" th:if="${errorMessage != null}" th:text="${errorMessage}"></div>
                
                <div class="form-group">
                    <label for="username">
                        <i class="fas fa-user"></i> Username
                    </label>
                    <input type="text" class="form-control" id="username" name="username" th:field="*{username}" placeholder="Choose a username" required>
                </div>

                <div class="form-group">
                    <label for="email">
                        <i class="fas fa-envelope"></i> Email Address
                    </label>
                    <input type="email" class="form-control" id="email" name="email" th:field="*{email}" placeholder="your@email.com" required>
                </div>

                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i> Password
                    </label>
                    <input type="password" class="form-control" id="password" name="password" th:field="*{password}" placeholder="Create a strong password" required>
                </div>

                <div class="role-selection">
                    <label class="form-label">
                        <i class="fas fa-id-badge"></i> I am a
                    </label>
                    <div class="role-buttons">
                        <label class="role-btn" th:classappend="${user.role == T(com.example.table_booking.model.User.UserRole).CUSTOMER} ? 'active' : ''">
                            <input type="radio" name="role" th:value="CUSTOMER" th:field="*{role}" checked>
                            <div class="role-content">
                                <div class="role-icon"><i class="fas fa-utensils"></i></div>
                                <div class="role-title">Customer</div>
                                <p class="role-desc">Book tables at restaurants</p>
                            </div>
                            <div class="checkmark">
                                <i class="fas fa-check"></i>
                            </div>
                        </label>
                        <label class="role-btn" th:classappend="${user.role == T(com.example.table_booking.model.User.UserRole).RESTAURANT_OWNER} ? 'active' : ''">
                            <input type="radio" name="role" th:value="RESTAURANT_OWNER" th:field="*{role}">
                            <div class="role-content">
                                <div class="role-icon"><i class="fas fa-building"></i></div>
                                <div class="role-title">Restaurant Owner</div>
                                <p class="role-desc">Manage your restaurant</p>
                            </div>
                            <div class="checkmark">
                                <i class="fas fa-check"></i>
                            </div>
                        </label>
                    </div>
                </div>

                <button type="submit" class="btn-modern btn-modern-primary register-button btn-with-icon">
                    <i class="fas fa-arrow-right"></i> Create Account
                </button>
            </form>
        </div>
        
        <div class="register-footer">
            <p>Already have an account? <a href="/login">Sign in here</a></p>
        </div>
    </div>
    
    <div class="back-link">
        <a href="/">
            <i class="fas fa-arrow-left"></i> Back to Home
        </a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Add active class to role buttons when selected
        document.addEventListener('DOMContentLoaded', function() {
            const roleButtons = document.querySelectorAll('.role-btn');
            const radioInputs = document.querySelectorAll('.role-btn input[type="radio"]');
            
            radioInputs.forEach(radio => {
                radio.addEventListener('change', function() {
                    // Remove active class from all buttons
                    roleButtons.forEach(btn => btn.classList.remove('active'));
                    // Add active class to parent button of checked radio
                    this.closest('.role-btn').classList.add('active');
                });
                
                // Initialize active state on page load
                if (radio.checked) {
                    radio.closest('.role-btn').classList.add('active');
                }
            });
            
            roleButtons.forEach(button => {
                button.addEventListener('click', function(e) {
                    const radio = this.querySelector('input[type="radio"]');
                    if (radio) {
                        radio.checked = true;
                        radio.dispatchEvent(new Event('change', { bubbles: true }));
                    }
                });
            });
        });
    </script>
</body>
</html>
