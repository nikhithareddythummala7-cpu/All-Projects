<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Restaurant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .form-container {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            padding: 30px;
            margin-top: 30px;
        }
        .form-title {
            color: #333;
            margin-bottom: 30px;
            font-weight: 600;
        }
        .form-label {
            font-weight: 500;
        }
        .btn-submit {
            background-color: #0d6efd;
            border: none;
            padding: 10px 25px;
            font-weight: 500;
        }
        .btn-submit:hover {
            background-color: #0b5ed7;
        }
        .error-message {
            color: #dc3545;
            font-size: 0.875em;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Table Booking System</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/dashboard">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/restaurant/bookings">Bookings</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/restaurant/tables">Tables</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/restaurant/profile">Profile</a>
                    </li>
                    <li class="nav-item">
                        <form th:action="@{/logout}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-link nav-link">Logout</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="form-container">
                    <h2 class="form-title text-center">Add Your Restaurant </h2>
                    
                    <!-- Error Message -->
                    <div th:if="${errorMessage}" class="alert alert-danger" role="alert">
                        <i class="fas fa-exclamation-circle me-2"></i>
                        <span th:text="${errorMessage}"></span>
                    </div>
                    
                    <!-- Success Message -->
                    <div th:if="${successMessage}" class="alert alert-success" role="alert">
                        <i class="fas fa-check-circle me-2"></i>
                        <span th:text="${successMessage}"></span>
                    </div>
                    
                    <form th:action="@{/api/restaurants/add}" th:object="${restaurant}" method="post" id="restaurantForm">
                        <!-- Restaurant Name -->
                        <div class="mb-3">
                            <label for="name" class="form-label">Restaurant Name <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="name" name="name" th:field="*{name}" required>
                            <div class="error-message" id="nameError"></div>
                        </div>
                        
                        <!-- Address -->
                        <div class="mb-3">
                            <label for="address" class="form-label">Address <span class="text-danger">*</span></label>
                            <textarea class="form-control" id="address" name="address" th:field="*{address}" rows="2" required></textarea>
                            <div class="error-message" id="addressError"></div>
                        </div>
                        
                        <!-- Phone Number -->
                        <div class="mb-3">
                            <label for="phoneNumber" class="form-label">Phone Number <span class="text-danger">*</span></label>
                            <input type="tel" class="form-control" id="phoneNumber" name="phoneNumber" th:field="*{phoneNumber}" required>
                            <div class="error-message" id="phoneError"></div>
                        </div>
                        
                        <!-- Description -->
                        <div class="mb-3">
                            <label for="description" class="form-label">Description</label>
                            <textarea class="form-control" id="description" name="description" th:field="*{description}" rows="3"></textarea>
                        </div>
                        <div class="mb-3">
    <label for="imageUrl" class="form-label">Image URL</label>
    <input type="text" class="form-control" id="imageUrl"
           th:field="*{images}" placeholder="https://example.com/image.jpg">
</div>

                        
                        <!-- Opening/Closing Time -->
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="openingTime" class="form-label">Opening Time <span class="text-danger">*</span></label>
                                <input type="time" class="form-control" id="openingTime" name="openingTime" th:field="*{openingTime}" required>
                                <div class="error-message" id="openingTimeError"></div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="closingTime" class="form-label">Closing Time <span class="text-danger">*</span></label>
                                <input type="time" class="form-control" id="closingTime" name="closingTime" th:field="*{closingTime}" required>
                                <div class="error-message" id="closingTimeError"></div>
                            </div>
                        </div>
                        
                        <!-- Cuisine Type -->
                        <div class="mb-4">
                            <label for="cuisineType" class="form-label">Cuisine Type <span class="text-danger">*</span></label>
                            <select class="form-select" id="cuisineType" name="cuisineType" th:field="*{cuisineType}" required>
                                <option value="">Select cuisine type</option>
                                <option value="ITALIAN">Italian</option>
                                <option value="CHINESE">Chinese</option>
                                <option value="INDIAN">Indian</option>
                                <option value="MEXICAN">Mexican</option>
                                <option value="AMERICAN">American</option>
                                <option value="JAPANESE">Japanese</option>
                                <option value="THAI">Thai</option>
                                <option value="FRENCH">French</option>
                                <option value="MEDITERRANEAN">Mediterranean</option>
                                <option value="OTHER">Other</option>
                            </select>
                            <div class="error-message" id="cuisineTypeError"></div>
                        </div>
                        
                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a href="/dashboard" class="btn btn-outline-secondary me-md-2">Cancel</a>
                            <button type="submit" class="btn btn-primary btn-submit">Save Restaurant</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('restaurantForm');
            
            // Client-side validation
            form.addEventListener('submit', function(event) {
                let isValid = true;
                
                // Reset error messages
                document.querySelectorAll('.error-message').forEach(el => el.textContent = '');
                
                // Validate name
                const name = document.getElementById('name').value.trim();
                if (!name) {
                    document.getElementById('nameError').textContent = 'Restaurant name is required';
                    isValid = false;
                }
                
                // Validate address
                const address = document.getElementById('address').value.trim();
                if (!address) {
                    document.getElementById('addressError').textContent = 'Address is required';
                    isValid = false;
                }
                
                // Validate phone number
                const phoneNumber = document.getElementById('phoneNumber').value.trim();
                if (!phoneNumber) {
                    document.getElementById('phoneError').textContent = 'Phone number is required';
                    isValid = false;
                } else if (!/^[0-9\-\+\(\)\s]+$/.test(phoneNumber)) {
                    document.getElementById('phoneError').textContent = 'Please enter a valid phone number';
                    isValid = false;
                }
                
                // Validate opening/closing time
                const openingTime = document.getElementById('openingTime').value;
                const closingTime = document.getElementById('closingTime').value;
                
                if (!openingTime) {
                    document.getElementById('openingTimeError').textContent = 'Opening time is required';
                    isValid = false;
                }
                
                if (!closingTime) {
                    document.getElementById('closingTimeError').textContent = 'Closing time is required';
                    isValid = false;
                } else if (openingTime && closingTime && openingTime >= closingTime) {
                    document.getElementById('closingTimeError').textContent = 'Closing time must be after opening time';
                    isValid = false;
                }
                
                // Validate cuisine type
                const cuisineType = document.getElementById('cuisineType').value;
                if (!cuisineType) {
                    document.getElementById('cuisineTypeError').textContent = 'Please select a cuisine type';
                    isValid = false;
                }
                
                if (!isValid) {
                    event.preventDefault();
                    // Scroll to the first error
                    const firstError = document.querySelector('.error-message:not(:empty)');
                    if (firstError) {
                        firstError.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                }
            });
        });
    </script>
</body>
</html>
