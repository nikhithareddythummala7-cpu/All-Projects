<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Task Management</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/tasks">Task Management</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link text-light me-3" href="/projects">Projects</a>
            <a class="nav-link text-light me-3" href="/admin/users" sec:authorize="hasRole('ADMIN')">Admin</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
            </form>
    </div>
 </nav>
 <div class="container mt-5">
    <h2 class="text-center mb-4">Projects & Tasks</h2>
    <div th:if="${param.forbidden}" class="alert alert-warning">You don't have permission for that action.</div>

    <!-- Projects Section -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0">Projects</h4>
        <a href="/projects/new" class="btn btn-success btn-sm" sec:authorize="!hasRole('VIEWER')">New Project</a>
    </div>
    <div class="card shadow mb-4">
        <div class="card-body">
            <div th:if="${#lists.isEmpty(projects)}" class="text-muted">No projects yet. Create one to get started.</div>
            <table class="table table-bordered table-striped" th:if="${!#lists.isEmpty(projects)}">
                <thead class="table-dark">
                <tr>
                    <th>Name</th>
                    <th>Status</th>
                    <th>Start</th>
                    <th>End</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${projects}">
                    <td th:text="${p.projectName}"></td>
                    <td th:text="${p.status}"></td>
                    <td th:text="${p.startDate}"></td>
                    <td th:text="${p.endDate}"></td>
                    <td>
                        <a th:href="@{'/projects/edit/' + ${p.id}}" class="btn btn-warning btn-sm" sec:authorize="!hasRole('VIEWER')">Edit</a>
                        <form th:action="@{'/projects/delete/' + ${p.id}}" method="post" class="d-inline ms-2" onsubmit="return confirm('Delete this project?');" sec:authorize="!hasRole('VIEWER')">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
            <div class="mt-2"><a href="/projects" class="btn btn-link btn-sm">View all projects</a></div>
        </div>
    </div>

    <!-- Tasks Section -->
    <div class="d-flex justify-content-end mb-3">
      <a href="/tasks/new" class="btn btn-success" sec:authorize="!hasRole('VIEWER')">Add New Task</a>
    </div>
    <div class="card shadow">
        <div class="card-body">
            <table class="table table-bordered table-striped">
                <thead class="table-dark">
                <tr>
                    <th>Title</th>
                    <th>Description</th>
                    <th>Status</th>
                    <th>Due Date</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="task : ${tasks}">
                    <td th:text="${task.title}"></td>
                    <td th:text="${task.description}"></td>
                    <td>
                        <span th:classappend="${task.status == 'Completed' ? 'badge bg-success' : (task.status == 'In Progress' ? 'badge bg-warning' : 'badge bg-secondary') }" th:text="${task.status}"></span>
                    </td>
                    <td th:text="${task.dueDate}"></td>
                    <td>
                        <a th:href="@{/tasks/edit/{id}(id=${task.id})}" class="btn btn-warning btn-sm" sec:authorize="!hasRole('VIEWER')">Edit</a>
                        <a th:href="@{/tasks/delete/{id}(id=${task.id})}" class="btn btn-danger btn-sm" onclick="return confirm('Are you sure?')" sec:authorize="!hasRole('VIEWER')">Delete</a>
                        <span class="text-muted" sec:authorize="hasRole('VIEWER')">Read-only</span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
 </div>
 <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
