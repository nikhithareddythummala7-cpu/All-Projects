<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Admin - Users</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/tasks">Task Management</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link text-light me-3" href="/admin/tasks">All Tasks</a>
            <span class="navbar-text me-3">Welcome, <span sec:authentication="name"></span></span>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>
<div class="container mt-5">
    <h2 class="mb-4">Admin: Users</h2>
    <div th:if="${param.error} == 'cannot_delete_self'" class="alert alert-warning">You cannot delete your own account.</div>
    <div class="card shadow">
        <div class="card-body">
            <table class="table table-bordered table-striped">
                <thead class="table-dark">
                <tr>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="u : ${users}">
                    <td th:text="${u.username}"></td>
                    <td th:text="${u.email}"></td>
                    <td th:text="${u.role}"></td>
                    <td>
                        <form th:action="@{'/admin/users/' + ${u.id} + '/role'}" method="post" class="d-flex gap-2">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <select name="role" class="form-select form-select-sm" style="width:auto;">
                                <option value="ADMIN" th:selected="${u.role}=='ADMIN'">ADMIN</option>
                                <option value="TASK_MANAGER" th:selected="${u.role}=='TASK_MANAGER'">TASK_MANAGER</option>
                                <option value="VIEWER" th:selected="${u.role}=='VIEWER'">VIEWER</option>
                            </select>
                            <button type="submit" class="btn btn-primary btn-sm">Update</button>
                        </form>
                        <form th:action="@{'/admin/users/' + ${u.id} + '/delete'}" method="post" class="d-inline ms-2" onsubmit="return confirm('Delete this user? This cannot be undone.');">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
