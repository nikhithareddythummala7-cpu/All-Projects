<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Projects</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/tasks">Task Management</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link text-light me-3" href="/projects">Projects</a>
            <a class="nav-link text-light me-3" href="/admin/users" sec:authorize="hasRole('ADMIN')">Admin</a>
            <span class="navbar-text me-3">Welcome, <span sec:authentication="name"></span></span>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="mb-0">My Projects</h2>
        <a href="/projects/new" class="btn btn-success">New Project</a>
    </div>
    <div th:if="${param.forbidden}" class="alert alert-warning">You don't have permission for that action.</div>
    <div class="card shadow">
        <div class="card-body">
            <table class="table table-bordered table-striped">
                <thead class="table-dark">
                <tr>
                    <th>Name</th>
                    <th>Status</th>
                    <th>Start</th>
                    <th>End</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${projects}">
                    <td th:text="${p.projectName}"></td>
                    <td th:text="${p.status}"></td>
                    <td th:text="${p.startDate}"></td>
                    <td th:text="${p.endDate}"></td>
                    <td>
                        <a th:href="@{'/projects/edit/' + ${p.id}}" class="btn btn-warning btn-sm">Edit</a>
                        <form th:action="@{'/projects/delete/' + ${p.id}}" method="post" class="d-inline ms-2" onsubmit="return confirm('Delete this project?');">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
