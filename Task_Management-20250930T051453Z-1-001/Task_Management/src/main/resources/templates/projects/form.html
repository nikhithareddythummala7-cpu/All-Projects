<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Project</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/tasks">Task Management</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link text-light me-3" href="/projects">Projects</a>
            <a class="nav-link text-light me-3" href="/admin/users" sec:authorize="hasRole('ADMIN')">Admin</a>
            <span class="navbar-text me-3">Welcome, <span sec:authentication="name"></span></span>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>
<div class="container mt-5">
    <div class="card shadow">
        <div class="card-body">
            <h2 class="mb-4" th:text="${project.id} != null ? 'Edit Project' : 'New Project'"></h2>
            <form th:action="${project.id} != null ? @{'/projects/update/' + ${project.id}} : @{/projects/save}" method="post" th:object="${project}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Name</label>
                        <input type="text" class="form-control" th:field="*{projectName}" required />
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Status</label>
                        <select class="form-select" th:field="*{status}">
                            <option value="Planned">Planned</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Completed">Completed</option>
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" th:field="*{description}" rows="3"></textarea>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Start Date</label>
                        <input type="date" class="form-control" th:field="*{startDate}" />
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">End Date</label>
                        <input type="date" class="form-control" th:field="*{endDate}" />
                    </div>
                    <div class="col-12">
                        <label class="form-label">Team Members (usernames, comma-separated)</label>
                        <input type="text" class="form-control" name="teamUsernames" th:value="${teamUsernames}" placeholder="e.g. alice,bob,charlie" />
                        <div class="form-text">All team members will have full edit rights on this project.</div>
                    </div>
                </div>
                <div class="mt-4">
                    <button type="submit" class="btn btn-primary">Save</button>
                    <a href="/projects" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
