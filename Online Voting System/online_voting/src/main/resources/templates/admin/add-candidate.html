<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Candidate</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f5f7fa;
        }
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/admin/dashboard">🛡️ Admin Dashboard</a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row">
            <div class="col-md-8 offset-md-2">
                <h1>Add Candidate</h1>
                <p class="text-muted" th:text="'Election: ' + ${election.name}"></p>
                
                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
                    <span th:text="${error}"></span>
                </div>

                <form method="POST" th:action="'/admin/election/' + ${election.id} + '/candidate/add'" th:object="${candidate}">
                    <div class="mb-3">
                        <label for="name" class="form-label">Candidate Name *</label>
                        <input type="text" class="form-control" id="name" th:field="*{name}" required>
                    </div>

                    <div class="mb-3">
                        <label for="party" class="form-label">Political Party *</label>
                        <input type="text" class="form-control" id="party" th:field="*{party}" required>
                    </div>

                    <div class="mb-3">
                        <label for="symbol" class="form-label">Election Symbol *</label>
                        <input type="text" class="form-control" id="symbol" th:field="*{symbol}" required>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea class="form-control" id="description" th:field="*{description}" rows="3"></textarea>
                    </div>

                    <div class="mb-3">
                        <label for="imageUrl" class="form-label">Image URL</label>
                        <input type="url" class="form-control" id="imageUrl" th:field="*{imageUrl}">
                    </div>

                    <div class="mb-3">
                        <button type="submit" class="btn btn-primary">Add Candidate</button>
                        <a th:href="'/admin/election/' + ${election.id} + '/candidates'" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
