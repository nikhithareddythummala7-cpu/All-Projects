<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Elections</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel=\"stylesheet\" href=\"https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css\">
    <style>
        * {
            transition: all 0.3s ease;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }
        
        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            padding: 40px;
            margin-top: 40px;
            margin-bottom: 40px;
        }
        
        h1 {
            color: #667eea;
            font-weight: 700;
            margin-bottom: 30px;
        }
        
        .table-responsive {
            border-radius: 10px;
            overflow: hidden;
        }
        
        .table {
            margin-bottom: 0;
        }
        
        .table thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .table thead th {
            border: none;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            padding: 15px;
        }
        
        .table tbody tr {
            border-bottom: 1px solid #e0e0e0;
        }
        
        .table tbody tr:hover {
            background-color: #f8f9fa;
        }
        
        .table tbody td {
            padding: 15px;
            vertical-align: middle;
        }
        
        .badge {
            padding: 8px 12px;
            border-radius: 20px;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
        }
        
        .btn-sm {
            padding: 8px 15px;
            font-weight: 600;
            border-radius: 8px;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
            margin: 0 3px;
        }
        
        .btn-warning {
            background: linear-gradient(135deg, #ffc107 0%, #e0a800 100%) !important;
            color: white;
            border: none;
        }
        
        .btn-warning:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255,193,7,0.4);
            color: white;
        }
        
        .btn-info {
            background: linear-gradient(135deg, #17a2b8 0%, #138496 100%) !important;
            color: white;
            border: none;
        }
        
        .btn-info:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(23,162,184,0.4);
            color: white;
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, #6c757d 0%, #545b62 100%) !important;
            color: white;
            border: none;
        }
        
        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(108,117,125,0.4);
            color: white;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important;
            border: none;
            padding: 12px 20px;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102,126,234,0.4);
            color: white;
        }
        
        .btn-outline-secondary {
            color: #667eea;
            border: 2px solid #667eea;
            font-weight: 600;
        }
        
        .btn-outline-secondary:hover {
            background: #667eea;
            border-color: #667eea;
            color: white;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/admin/dashboard">🛡️ Admin Dashboard</a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row mb-4">
            <div class="col-md-8">
                <h1>Manage Elections</h1>
            </div>
            <div class="col-md-4 text-end">
                <a href="/admin/election/create" class="btn btn-primary">➕ Create Election</a>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>Name</th>
                        <th>Status</th>
                        <th>Start Date</th>
                        <th>End Date</th>
                        <th>Candidates</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="election : ${elections}">
                        <td th:text="${election.name}"></td>
                        <td>
                            <span class="badge" 
                                  th:classappend="${election.status.name() == 'ACTIVE' ? 'bg-success' : election.status.name() == 'DRAFT' ? 'bg-secondary' : 'bg-primary'}"
                                  th:text="${election.status}"></span>
                        </td>
                        <td th:text="${#temporals.format(election.startDate, 'yyyy-MM-dd HH:mm')}"></td>
                        <td th:text="${#temporals.format(election.endDate, 'yyyy-MM-dd HH:mm')}"></td>
                        <td th:text="${election.candidateIds.size()}"></td>
                        <td>
                            <a th:href="'/admin/election/' + ${election.id} + '/edit'" class="btn btn-sm btn-warning">Edit</a>
                            <a th:href="'/admin/election/' + ${election.id} + '/candidates'" class="btn btn-sm btn-info">Candidates</a>
                            <a th:href="'/admin/election/' + ${election.id} + '/results'" class="btn btn-sm btn-secondary">Results</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <a href="/admin/dashboard" class="btn btn-outline-secondary mt-3">← Back to Dashboard</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
