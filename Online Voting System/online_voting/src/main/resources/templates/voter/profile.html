<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voter Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f5f7fa;
        }
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/voter/dashboard">🗳️ Voter Dashboard</a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row">
            <div class="col-md-8 offset-md-2">
                <h1>My Profile</h1>
                
                <div class="card mt-4">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">Personal Information</h5>
                    </div>
                    <div class="card-body">
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <p><strong>First Name:</strong><br><span th:text="${voter.firstName}"></span></p>
                            </div>
                            <div class="col-md-6">
                                <p><strong>Last Name:</strong><br><span th:text="${voter.lastName}"></span></p>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <p><strong>Email:</strong><br><span th:text="${voter.email}"></span></p>
                            </div>
                            <div class="col-md-6">
                                <p><strong>Phone:</strong><br><span th:text="${voter.phoneNumber}"></span></p>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <p><strong>Voter ID:</strong><br><span th:text="${voter.voterId}"></span></p>
                            </div>
                            <div class="col-md-6">
                                <p><strong>Aadhaar ID:</strong><br><span th:text="${voter.aadhaarId != null ? voter.aadhaarId : 'Not provided'}"></span></p>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <p><strong>State:</strong><br><span th:text="${voter.state}"></span></p>
                            </div>
                            <div class="col-md-6">
                                <p><strong>District:</strong><br><span th:text="${voter.district}"></span></p>
                            </div>
                        </div>

                        <div class="mb-3">
                            <p><strong>Address:</strong><br><span th:text="${voter.address}"></span></p>
                        </div>

                        <div class="row">
                            <div class="col-md-6">
                                <p><strong>Registration Date:</strong><br><span th:text="${#temporals.format(voter.registrationDate, 'yyyy-MM-dd')}"></span></p>
                            </div>
                            <div class="col-md-6">
                                <p><strong>Status:</strong><br>
                                    <span th:if="${voter.approved}" class="badge bg-success">✓ Approved</span>
                                    <span th:unless="${voter.approved}" class="badge bg-warning">Pending Approval</span>
                                </p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mt-4">
                    <a href="/voter/change-password" class="btn btn-warning">Change Password</a>
                    <a href="/voter/dashboard" class="btn btn-secondary">Back to Dashboard</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
