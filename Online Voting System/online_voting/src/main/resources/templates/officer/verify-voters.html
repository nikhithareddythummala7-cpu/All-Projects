<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Voters</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f5f7fa;
        }
        .navbar {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/officer/dashboard">👮 Election Officer Dashboard</a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row mb-4">
            <div class="col-md-12">
                <h1>Verify & Approve Voters</h1>
                <p class="text-muted">Review pending voter registrations</p>
            </div>
        </div>

        <div th:if="${message}" class="alert alert-success alert-dismissible fade show">
            <span th:text="${message}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div th:if="${pendingVoters.isEmpty()}" class="alert alert-info">
            No pending voter approvals at the moment.
        </div>

        <div class="table-responsive" th:unless="${pendingVoters.isEmpty()}">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>Voter ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Aadhaar</th>
                        <th>Registration Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="voter : ${pendingVoters}">
                        <td><strong th:text="${voter.voterId}"></strong></td>
                        <td th:text="${voter.firstName + ' ' + voter.lastName}"></td>
                        <td th:text="${voter.email}"></td>
                        <td th:text="${voter.phoneNumber}"></td>
                        <td th:text="${voter.aadhaarId}"></td>
                        <td th:text="${#temporals.format(voter.registrationDate, 'yyyy-MM-dd')}"></td>
                        <td>
                            <form method="POST" th:action="'/officer/approve-voter/' + ${voter.id}" style="display: inline;">
                                <button type="submit" class="btn btn-sm btn-success">✓ Approve</button>
                            </form>
                            <form method="POST" th:action="'/officer/reject-voter/' + ${voter.id}" style="display: inline;">
                                <button type="submit" class="btn btn-sm btn-danger">✗ Reject</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <a href="/officer/dashboard" class="btn btn-outline-secondary mt-3">← Back to Dashboard</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
