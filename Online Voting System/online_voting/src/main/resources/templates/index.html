<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Voting System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .hero {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        .hero h1 {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .hero p {
            font-size: 1.3rem;
            margin-bottom: 30px;
        }
        .btn-login {
            background-color: #fff;
            color: #667eea;
            font-weight: bold;
            padding: 12px 30px;
            border-radius: 50px;
            margin: 10px;
            transition: all 0.3s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>🗳️ Online Voting System</h1>
        <p>Secure, Transparent, and Tamper-Proof Elections</p>
        
        <div class="mt-5">
            <a href="/login" class="btn btn-login">Sign In</a>
            <a href="/register" class="btn btn-login">Register as Voter</a>
        </div>
        
        <div class="mt-5">
            <p style="font-size: 0.9rem; opacity: 0.9;">
                🔐 Your vote is secure and anonymous | 📊 Real-time results | ✅ One vote per election
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
