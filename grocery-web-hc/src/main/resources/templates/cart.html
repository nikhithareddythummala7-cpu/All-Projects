<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Your Cart • FreshCart</title>
	<link rel="stylesheet" href="/css/styles.css">
</head>
<body>
	<header class="site-header">
		<a class="logo" href="/">FreshCart</a>
		<nav>
			<a href="/products">Products</a>
			<a href="/cart" class="active">Cart</a>
			<a href="/orders">Orders</a>
			<a id="admin-link" href="/admin" style="display:none">Admin</a>
			<a id="auth-link" href="/login">Login</a>
		</nav>
	</header>

	<main class="container">
		<h1>Your Cart</h1>
		<div id="cart-items" class="cart-list"></div>
		<div class="cart-footer">
			<div id="cart-total"></div>
			<button class="button" id="checkout-btn">Checkout</button>
		</div>
		<div id="cart-error" class="error"></div>
	</main>

	<script src="/js/app.js"></script>
	<script>
		updateAuthLink();
		loadCart();
		document.getElementById('checkout-btn').addEventListener('click', handleCheckout);
	</script>
</body>
</html>
