<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transaction History - SB Stocks</title>
  <link rel="stylesheet" th:href="@{/css/navbar.css}">
  <link rel="stylesheet" th:href="@{/css/history.css}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <!-- Navigation Bar -->
  <div class="navbar" id="navbar">
    <!-- Content will be injected by JS depending on userType -->
  </div>

  <div class="history-container">
    <div class="history-header">
      <h1>Transaction History</h1>
      <div class="history-filters">
        <select id="typeFilter" class="filter-select">
          <option value="">All Types</option>
          <option value="Deposit">Deposits</option>
          <option value="Withdraw">Withdrawals</option>
          <option value="buy">Stock Purchases</option>
          <option value="sell">Stock Sales</option>
        </select>
        <input type="date" id="dateFrom" class="filter-input" placeholder="From Date">
        <input type="date" id="dateTo" class="filter-input" placeholder="To Date">
        <button class="btn-filter" onclick="applyFilters()">Filter</button>
        <button class="btn-clear" onclick="clearFilters()">Clear</button>
      </div>
    </div>

    <div class="history-summary">
      <div class="summary-card">
        <h3>Total Deposits</h3>
        <p class="summary-amount positive" id="totalDeposits">$0.00</p>
      </div>
      <div class="summary-card">
        <h3>Total Withdrawals</h3>
        <p class="summary-amount negative" id="totalWithdrawals">$0.00</p>
      </div>
      <div class="summary-card">
        <h3>Stock Purchases</h3>
        <p class="summary-amount negative" id="totalPurchases">$0.00</p>
      </div>
      <div class="summary-card">
        <h3>Stock Sales</h3>
        <p class="summary-amount positive" id="totalSales">$0.00</p>
      </div>
    </div>

    <div class="transactions-section">
      <div class="transactions-header">
        <h2>All Transactions</h2>
        <div class="transactions-actions">
          <button class="btn-export" onclick="exportTransactions()">Export CSV</button>
          <button class="btn-refresh" onclick="loadTransactions()">Refresh</button>
        </div>
      </div>
      
      <div class="transactions-table-container">
        <table class="transactions-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Type</th>
              <th>Description</th>
              <th>Amount</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="transactionsTableBody">
            <tr>
              <td colspan="6" class="loading-cell">
                <div class="loading-spinner"></div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Transaction Detail Modal -->
  <div id="transactionModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Transaction Details</h3>
        <span class="close" onclick="closeModal('transactionModal')">&times;</span>
      </div>
      <div class="modal-body" id="transactionDetails">
        <!-- Transaction details will be loaded here -->
      </div>
    </div>
  </div>

  <script th:src="@{/js/navbar.js}"></script>
  <script th:src="@{/js/history.js}"></script>
</body>
</html>
