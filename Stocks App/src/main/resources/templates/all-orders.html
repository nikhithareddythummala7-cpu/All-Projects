<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Orders</title>
    <link rel="stylesheet" th:href="@{/css/AllOrders.css}">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
    <div class="orderPage">
        <div class="all-orders-container">
            <div class="all-orders-container-head">
                <h2>My Orders</h2>
            </div>
            <div class="all-orders" id="ordersContainer">
                <!-- Orders will be injected here -->
            </div>
        </div>
    </div>

    <script>
        const ordersContainer = document.getElementById('ordersContainer');

        const fetchOrders = async () => {
            try {
                const response = await axios.get('http://localhost:6001/fetch-orders');
                const orders = response.data.reverse();

                ordersContainer.innerHTML = ''; // clear container
                orders.forEach(order => {
                    const orderDiv = document.createElement('div');
                    orderDiv.classList.add('all-orders-stock');

                    orderDiv.innerHTML = `
                        <span><h5>UserId</h5><p>${order.user}</p></span>
                        <span><h5>Order Type</h5><p>${order.stockType}</p></span>
                        <span><h5>Stock name</h5><p>${order.name}</p></span>
                        <span><h5>Symbol</h5><p>${order.symbol}</p></span>
                        <span><h5>Order type</h5><p>${order.orderType}</p></span>
                        <span><h5>Stocks</h5><p>${order.count}</p></span>
                        <span><h5>Order price</h5><p>$ ${order.price}</p></span>
                        <span><h5>Order total value</h5><p>$ ${order.totalPrice}</p></span>
                        <span><h5>Order status</h5><p style="color:green">${order.orderStatus}</p></span>
                    `;
                    ordersContainer.appendChild(orderDiv);
                });
            } catch (err) {
                console.error(err);
            }
        };

        fetchOrders();
    </script>
</body>
</html>
