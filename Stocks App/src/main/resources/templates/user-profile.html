<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile - SB Stocks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header">
                        <h2>User Profile</h2>
                    </div>
                    <div class="card-body" th:if="${user}">
                        <div class="row mb-3">
                            <div class="col-sm-3">
                                <strong>Username:</strong>
                            </div>
                            <div class="col-sm-9" th:text="${user.username}">Username</div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-sm-3">
                                <strong>Email:</strong>
                            </div>
                            <div class="col-sm-9" th:text="${user.email}">Email</div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-sm-3">
                                <strong>User Type:</strong>
                            </div>
                            <div class="col-sm-9" th:text="${user.userType}">User Type</div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-sm-3">
                                <strong>Balance:</strong>
                            </div>
                            <div class="col-sm-9">
                                $<span th:text="${#numbers.formatDecimal(user.balance, 1, 2)}">0.00</span>
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-sm-3">
                                <strong>User ID:</strong>
                            </div>
                            <div class="col-sm-9" th:text="${user.id}">User ID</div>
                        </div>
                    </div>
                    <div class="card-body" th:unless="${user}">
                        <div class="alert alert-danger">
                            User not found!
                        </div>
                    </div>
                    <div class="card-footer">
                        <a th:href="@{/}" class="btn btn-primary">Back to Home</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
