<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - SB Stocks</title>
  <link rel="stylesheet" th:href="@{/css/navbar.css}">
  <link rel="stylesheet" th:href="@{/css/dashboard.css}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <!-- Navigation Bar -->
  <div class="navbar" id="navbar">
    <!-- Content will be injected by JS depending on userType -->
  </div>

  <div class="dashboard-container">
    <!-- Dashboard Header -->
    <div class="dashboard-header">
      <h1>Welcome back, <span id="userName">User</span>!</h1>
      <p class="dashboard-subtitle">Here's your trading overview</p>
    </div>

    <!-- Quick Stats -->
    <div class="quick-stats">
      <div class="stat-card">
        <div class="stat-icon">💰</div>
        <div class="stat-content">
          <h3>Portfolio Value</h3>
          <p class="stat-value" id="portfolioValue">$0.00</p>
          <span class="stat-change positive" id="portfolioChange">+0.00%</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">📈</div>
        <div class="stat-content">
          <h3>Today's Gain/Loss</h3>
          <p class="stat-value" id="todayGainLoss">$0.00</p>
          <span class="stat-change" id="todayChange">+0.00%</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">💼</div>
        <div class="stat-content">
          <h3>Total Holdings</h3>
          <p class="stat-value" id="totalHoldings">0</p>
          <span class="stat-change">stocks</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">💳</div>
        <div class="stat-content">
          <h3>Available Balance</h3>
          <p class="stat-value" id="availableBalance">$0.00</p>
          <span class="stat-change">cash</span>
        </div>
      </div>
    </div>

    <!-- Main Content -->
    <div class="dashboard-content">
      <!-- Portfolio Performance Chart -->
      <div class="chart-section">
        <div class="section-header">
          <h2>Portfolio Performance</h2>
          <div class="chart-controls">
            <button class="chart-btn active" onclick="changeChartPeriod('1D')">1D</button>
            <button class="chart-btn" onclick="changeChartPeriod('1W')">1W</button>
            <button class="chart-btn" onclick="changeChartPeriod('1M')">1M</button>
            <button class="chart-btn" onclick="changeChartPeriod('1Y')">1Y</button>
          </div>
        </div>
        <div class="chart-container">
          <canvas id="portfolioChart"></canvas>
        </div>
      </div>

      <!-- Top Holdings -->
      <div class="holdings-section">
        <div class="section-header">
          <h2>Top Holdings</h2>
          <a href="/portfolio" class="view-all-link">View All →</a>
        </div>
        <div class="holdings-list" id="topHoldings">
          <div class="loading-spinner"></div>
        </div>
      </div>

      <!-- Recent Activity -->
      <div class="activity-section">
        <div class="section-header">
          <h2>Recent Activity</h2>
          <a href="/history" class="view-all-link">View All →</a>
        </div>
        <div class="activity-list" id="recentActivity">
          <div class="loading-spinner"></div>
        </div>
      </div>

      <!-- Market News -->
      <div class="news-section">
        <div class="section-header">
          <h2>Market News</h2>
          <button class="refresh-btn" onclick="loadMarketNews()">Refresh</button>
        </div>
        <div class="news-list" id="marketNews">
          <div class="loading-spinner"></div>
        </div>
      </div>
    </div>
  </div>

  <script th:src="@{/js/navbar.js}"></script>
  <script th:src="@{/js/dashboard.js}"></script>
</body>
</html>
