<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Transactions</title>
    <link rel="stylesheet" th:href="@{/css/AllTransactions.css}">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
    <div class="all-transactions-page">
        <h2>All Transactions</h2>
        <div class="all-transactions" id="transactionsContainer">
            <!-- Transactions will be injected here -->
        </div>
    </div>

    <script>
        const transactionsContainer = document.getElementById('transactionsContainer');

        const fetchTransactions = async () => {
            try {
                const response = await axios.get('http://localhost:6001/transactions');
                const transactions = response.data.reverse();

                transactionsContainer.innerHTML = ''; // clear previous

                transactions.forEach(transaction => {
                    const tranDiv = document.createElement('div');
                    tranDiv.classList.add('admin-transaction');

                    tranDiv.innerHTML = `
                        <span><h6>Transaction Id</h6><p>${transaction._id}</p></span>
                        <span><h6>User Id</h6><p>${transaction.user}</p></span>
                        <span><h6>Amount</h6><p>$ ${transaction.amount}</p></span>
                        <span><h6>Action</h6><p>${transaction.type}</p></span>
                        <span><h6>Payment mode</h6><p>${transaction.paymentMode}</p></span>
                        <span><h6>Time</h6><p>${transaction.time.slice(0, 24)}</p></span>
                    `;
                    transactionsContainer.appendChild(tranDiv);
                });
            } catch (err) {
                console.error(err);
            }
        };

        fetchTransactions();
    </script>
</body>
</html>
