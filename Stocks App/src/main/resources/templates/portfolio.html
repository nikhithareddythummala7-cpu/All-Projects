<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio - SB Stocks</title>
  <link rel="stylesheet" th:href="@{/css/navbar.css}">
  <link rel="stylesheet" th:href="@{/css/portfolio.css}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <!-- Navigation Bar -->
  <div class="navbar" id="navbar">
    <!-- Content will be injected by JS depending on userType -->
  </div>

  <div class="portfolio-container">
    <!-- Portfolio Header -->
    <div class="portfolio-header">
      <h1>My Portfolio</h1>
      <div class="portfolio-summary">
        <div class="summary-card">
          <h3>Total Value</h3>
          <p class="total-value" id="totalValue">$0.00</p>
        </div>
        <div class="summary-card">
          <h3>Total Gain/Loss</h3>
          <p class="gain-loss" id="totalGainLoss">$0.00</p>
        </div>
        <div class="summary-card">
          <h3>Available Balance</h3>
          <p class="balance" id="availableBalance">$0.00</p>
        </div>
      </div>
    </div>

    <!-- Portfolio Actions -->
    <div class="portfolio-actions">
      <button class="btn-primary" onclick="showBuyModal()">Buy Stock</button>
      <button class="btn-secondary" onclick="showSellModal()">Sell Stock</button>
      <button class="btn-success" onclick="showDepositModal()">Deposit</button>
      <button class="btn-warning" onclick="showWithdrawModal()">Withdraw</button>
    </div>

    <!-- Holdings Section -->
    <div class="holdings-section">
      <h2>Current Holdings</h2>
      <div class="holdings-grid" id="holdingsGrid">
        <div class="loading-spinner"></div>
      </div>
    </div>

    <!-- Recent Transactions -->
    <div class="transactions-section">
      <h2>Recent Transactions</h2>
      <div class="transactions-list" id="transactionsList">
        <div class="loading-spinner"></div>
      </div>
    </div>
  </div>

  <!-- Buy Stock Modal -->
  <div id="buyModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Buy Stock</h3>
        <span class="close" onclick="closeModal('buyModal')">&times;</span>
      </div>
      <div class="modal-body">
        <form id="buyForm">
          <div class="form-group">
            <label for="buySymbol">Stock Symbol</label>
            <input type="text" id="buySymbol" placeholder="e.g., AAPL" required>
          </div>
          <div class="form-group">
            <label for="buyQuantity">Quantity</label>
            <input type="number" id="buyQuantity" placeholder="Number of shares" required>
          </div>
          <div class="form-group">
            <label for="buyPrice">Price per Share</label>
            <input type="number" id="buyPrice" step="0.01" placeholder="Current price" required>
          </div>
          <div class="form-group">
            <label for="buyTotal">Total Cost</label>
            <input type="number" id="buyTotal" readonly>
          </div>
          <button type="submit" class="btn-primary">Buy Stock</button>
        </form>
      </div>
    </div>
  </div>

  <!-- Sell Stock Modal -->
  <div id="sellModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Sell Stock</h3>
        <span class="close" onclick="closeModal('sellModal')">&times;</span>
      </div>
      <div class="modal-body">
        <form id="sellForm">
          <div class="form-group">
            <label for="sellSymbol">Stock Symbol</label>
            <select id="sellSymbol" required>
              <option value="">Select stock to sell</option>
            </select>
          </div>
          <div class="form-group">
            <label for="sellQuantity">Quantity</label>
            <input type="number" id="sellQuantity" placeholder="Number of shares" required>
          </div>
          <div class="form-group">
            <label for="sellPrice">Price per Share</label>
            <input type="number" id="sellPrice" step="0.01" placeholder="Current price" required>
          </div>
          <div class="form-group">
            <label for="sellTotal">Total Value</label>
            <input type="number" id="sellTotal" readonly>
          </div>
          <button type="submit" class="btn-primary">Sell Stock</button>
        </form>
      </div>
    </div>
  </div>

  <!-- Deposit Modal -->
  <div id="depositModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Deposit Funds</h3>
        <span class="close" onclick="closeModal('depositModal')">&times;</span>
      </div>
      <div class="modal-body">
        <form id="depositForm">
          <div class="form-group">
            <label for="depositAmount">Amount</label>
            <input type="number" id="depositAmount" step="0.01" placeholder="Enter amount" required>
          </div>
          <div class="form-group">
            <label for="depositMethod">Payment Method</label>
            <select id="depositMethod" required>
              <option value="bank">Bank Transfer</option>
              <option value="card">Credit/Debit Card</option>
              <option value="paypal">PayPal</option>
            </select>
          </div>
          <button type="submit" class="btn-primary">Deposit</button>
        </form>
      </div>
    </div>
  </div>

  <!-- Withdraw Modal -->
  <div id="withdrawModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Withdraw Funds</h3>
        <span class="close" onclick="closeModal('withdrawModal')">&times;</span>
      </div>
      <div class="modal-body">
        <form id="withdrawForm">
          <div class="form-group">
            <label for="withdrawAmount">Amount</label>
            <input type="number" id="withdrawAmount" step="0.01" placeholder="Enter amount" required>
          </div>
          <div class="form-group">
            <label for="withdrawMethod">Withdrawal Method</label>
            <select id="withdrawMethod" required>
              <option value="bank">Bank Transfer</option>
              <option value="card">Credit/Debit Card</option>
              <option value="paypal">PayPal</option>
            </select>
          </div>
          <button type="submit" class="btn-primary">Withdraw</button>
        </form>
      </div>
    </div>
  </div>

  <script th:src="@{/js/navbar.js}"></script>
  <script th:src="@{/js/portfolio.js}"></script>
</body>
</html>
