<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Stock Chart</title>
  <link rel="stylesheet" th:href="@{/css/AdminStockChart.css}">

  <!-- ApexCharts CDN -->
  <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
</head>
<body>
  <div class="adminStockPage">
    <div class="adminStockChart">
      <div id="stockChart"></div>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const id = urlParams.get("id") || urlParams.get("symbol") || "AAPL"; // Support both id and symbol params

    let stockValues = [];
    let stockExchange = "NASDAQ";
    let retryCount = 0;
    const maxRetries = 3;

    // Generate mock data for fallback
    function generateMockData() {
      const mockData = [];
      const basePrice = 150 + Math.random() * 100; // Random base price between 150-250
      const now = new Date();
      
      for (let i = 0; i < 100; i++) {
        const date = new Date(now.getTime() - (99 - i) * 60000); // 1 minute intervals
        const priceVariation = (Math.random() - 0.5) * 10; // Random price variation
        const open = basePrice + priceVariation;
        const close = open + (Math.random() - 0.5) * 5;
        const high = Math.max(open, close) + Math.random() * 3;
        const low = Math.min(open, close) - Math.random() * 3;
        
        mockData.push({
          x: date.getTime(),
          y: [open, high, low, close]
        });
      }
      return mockData;
    }

    function transformAndAppendData(apiResponse) {
      const close = parseFloat(apiResponse.close);
      const high = parseFloat(apiResponse.high);
      const low = parseFloat(apiResponse.low);
      const open = parseFloat(apiResponse.open);

      const datetime = new Date(apiResponse.datetime);
      const timestamp = datetime.getTime();

      const transformedObject = {
        x: timestamp,
        y: [open, high, low, close]
      };

      stockValues.push(transformedObject);
    }

    async function fetchStockData() {
      const options = {
        method: "GET",
        headers: {
          "X-RapidAPI-Key": "947b801f92msh96b919932628932p1a1413jsncb9cc7188719",
          "X-RapidAPI-Host": "twelve-data1.p.rapidapi.com"
        }
      };

      try {
        const response = await fetch(
          `https://twelve-data1.p.rapidapi.com/time_series?symbol=${id}&interval=1min&outputsize=100&format=json`,
          options
        );

        if (response.status === 429) {
          console.warn("Rate limit exceeded for stock data API, using mock data");
          stockValues = generateMockData();
          renderChart();
          return;
        }

        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }

        const data = await response.json();
        stockExchange = data.meta?.exchange || "NASDAQ";

        if (data.values && data.values.length > 0) {
          data.values.forEach(apiResponse => transformAndAppendData(apiResponse));
        } else {
          throw new Error("No data received from API");
        }

        renderChart();
      } catch (error) {
        console.error("Error fetching stock data:", error);
        
        if (retryCount < maxRetries) {
          retryCount++;
          console.log(`Retrying stock data fetch (${retryCount}/${maxRetries})...`);
          setTimeout(() => fetchStockData(), Math.pow(2, retryCount) * 1000);
        } else {
          console.log("Using mock stock data");
          stockValues = generateMockData();
          renderChart();
        }
      }
    }

    function renderChart() {
      const options = {
        chart: {
          type: "candlestick",
          height: 500,
          animations: {
            enabled: true,
            easing: 'easeinout',
            speed: 800
          }
        },
        title: {
          text: `${id} - ${stockExchange}`,
          align: "left",
          style: {
            fontSize: '18px',
            fontWeight: 'bold'
          }
        },
        subtitle: {
          text: stockValues.length > 0 ? 'Live Data' : 'Mock Data (API Unavailable)',
          align: "left",
          style: {
            fontSize: '12px',
            color: '#666'
          }
        },
        xaxis: {
          type: "datetime",
          labels: {
            datetimeUTC: false
          }
        },
        yaxis: {
          tooltip: { enabled: true },
          labels: {
            formatter: function (val) {
              return "$" + val.toFixed(2);
            }
          }
        },
        series: [{
          name: id,
          data: stockValues
        }],
        tooltip: {
          x: {
            format: 'dd MMM yyyy HH:mm'
          }
        },
        plotOptions: {
          candlestick: {
            colors: {
              upward: '#00B746',
              downward: '#EF403C'
            }
          }
        }
      };

      const chart = new ApexCharts(document.querySelector("#stockChart"), options);
      chart.render();
    }

    // Show loading state
    function showLoading() {
      document.querySelector("#stockChart").innerHTML = '<div style="display: flex; justify-content: center; align-items: center; height: 500px;"><div class="loading-spinner"></div></div>';
    }

    // Initialize
    showLoading();
    window.onload = fetchStockData;
  </script>
</body>
</html>
