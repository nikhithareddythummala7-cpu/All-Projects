<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register | SB Stocks</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/navbar.css}"/>
  <link rel="stylesheet" th:href="@{/css/styles.css}"/> <!-- custom css -->
</head>
<body>
  <!-- Navigation Bar -->
  <div class="navbar" id="navbar">
    <!-- Content will be injected by JS depending on userType -->
  </div>

  <div class="container mt-5">
    <form id="registerForm" class="authForm">
      <h2>Register</h2>

      <div class="form-floating mb-3 authFormInputs">
        <input type="text" class="form-control" id="username" placeholder="username" required />
        <label for="username">Username</label>
      </div>

      <div class="form-floating mb-3 authFormInputs">
        <input type="email" class="form-control" id="email" placeholder="name@example.com" required />
        <label for="email">Email address</label>
      </div>

      <div class="form-floating mb-3 authFormInputs">
        <input type="password" class="form-control" id="password" placeholder="Password" required />
        <label for="password">Password</label>
      </div>

      <select class="form-select form-select-lg mb-3" id="usertype" required>
        <option value="">User type</option>
        <option value="admin">Admin</option>
        <option value="customer">Customer</option>
      </select>

      <button type="submit" class="btn btn-primary">Sign up</button>

      <p class="mt-3">Already registered? <a th:href="@{/login}">Login</a></p>
    </form>
  </div>

  <!-- scripts -->
  <script th:src="@{/js/navbar.js}"></script>
  <script th:src="@{/js/auth.js}"></script>
  <script>
    document.getElementById("registerForm").addEventListener("submit", function(e) {
      e.preventDefault();
      const username = document.getElementById("username").value;
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const usertype = document.getElementById("usertype").value;

      if (validateRegisterForm(username, email, password, usertype)) {
        register(username, email, password, usertype); // from auth.js
      }
    });
  </script>
</body>
</html>
