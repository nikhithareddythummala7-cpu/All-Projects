<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | SB Stocks</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/navbar.css}"/>
  <link rel="stylesheet" th:href="@{/css/styles.css}"/> <!-- your custom css -->
</head>
<body>
  <!-- Navigation Bar -->
  <div class="navbar" id="navbar">
    <!-- Content will be injected by JS depending on userType -->
  </div>

  <div class="container mt-5">
    <form id="loginForm" class="authForm">
      <h2>Login</h2>

      <div class="form-floating mb-3 authFormInputs">
        <input type="email" class="form-control" id="email" placeholder="name@example.com" required />
        <label for="email">Email address</label>
      </div>

      <div class="form-floating mb-3 authFormInputs">
        <input type="password" class="form-control" id="password" placeholder="Password" required />
        <label for="password">Password</label>
      </div>

      <button type="submit" class="btn btn-primary">Sign in</button>

      <p class="mt-3">
        Not registered? <a th:href="@{/register}">Register</a>
      </p>
    </form>
  </div>

  <!-- scripts -->
  <script th:src="@{/js/navbar.js}"></script>
  <script th:src="@{/js/auth.js}"></script>
  <script>
    document.getElementById("loginForm").addEventListener("submit", function(e) {
      e.preventDefault();
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      
      if (validateLoginForm(email, password)) {
        login(email, password); // from auth.js
      }
    });
  </script>
</body>
</html>
